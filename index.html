<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMD ADAPT KIOSK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --cyan:#00d4ff;--pink:#ff0080;--dark:#050a0f;--card:#0d1b26;
    --border:#1a3a4a;--text:#c8e8f0;
  }
  body{background:var(--dark);color:var(--text);font-family:'Rajdhani',sans-serif;
       height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

  /* ── HEADER ── */
  #header{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 20px;background:rgba(0,0,0,0.6);border-bottom:1px solid var(--border);
    z-index:100;flex-shrink:0
  }
  #logo{font-family:'Bebas Neue';font-size:2rem;letter-spacing:3px}
  #logo span{color:var(--cyan)}
  #logo b{color:var(--pink)}
  #hdr-right{display:flex;align-items:center;gap:16px}
  #cam-status{display:flex;align-items:center;gap:6px;font-family:'Space Mono';font-size:.7rem}
  .dot{width:8px;height:8px;border-radius:50%;background:#333}
  .dot.live{background:#00ff88;box-shadow:0 0 8px #00ff88}
  #mode-label{font-family:'Bebas Neue';font-size:1.2rem;color:var(--cyan);letter-spacing:2px}

  /* ── MODE PILLS ── */
  #mode-bar{display:flex;gap:8px;align-items:center}
  .pill{
    padding:5px 14px;border-radius:20px;border:1px solid var(--border);
    font-family:'Space Mono';font-size:.65rem;letter-spacing:1px;cursor:pointer;
    background:transparent;color:#6a9ab0;transition:.2s;text-transform:uppercase
  }
  .pill:hover{border-color:var(--cyan);color:var(--cyan)}
  .pill.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.12)}

  /* ── VIDEO AREA ── */
  #video-wrap{
    flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
    background:#000
  }
  #video-feed{width:100%;height:100%;object-fit:cover}

  /* Corner brackets */
  .corner{position:absolute;width:28px;height:28px;border-color:var(--cyan);border-style:solid;opacity:.7}
  .corner.tl{top:12px;left:12px;border-width:2px 0 0 2px}
  .corner.tr{top:12px;right:12px;border-width:2px 2px 0 0}
  .corner.bl{bottom:12px;left:12px;border-width:0 0 2px 2px}
  .corner.br{bottom:12px;right:12px;border-width:0 2px 2px 0}

  /* Character name overlay */
  #char-label{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    text-align:center;padding:14px 30px 8px;pointer-events:none;
    display:none
  }
  #char-name{font-family:'Bebas Neue';font-size:3rem;letter-spacing:4px;
              text-shadow:0 0 30px currentColor;line-height:1}
  #char-sub{font-family:'Space Mono';font-size:.6rem;letter-spacing:3px;
             opacity:.7;margin-top:2px}

  /* ── GENERATE BUTTON ── */
  #gen-btn{
    position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    background:linear-gradient(135deg,var(--pink),var(--cyan));
    border:none;border-radius:8px;padding:14px 48px;
    font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:3px;color:#000;
    cursor:pointer;transition:.15s;box-shadow:0 0 30px rgba(0,212,255,.4);
    display:none;z-index:50
  }
  #gen-btn:hover{transform:translateX(-50%) scale(1.05);box-shadow:0 0 50px rgba(255,0,128,.6)}
  #gen-btn:active{transform:translateX(-50%) scale(0.97)}
  #gen-btn:disabled{opacity:.5;cursor:default}

  /* ── AI RESULT OVERLAY ── */
  #result-overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:rgba(0,0,0,.92);
    z-index:200;opacity:0;pointer-events:none;transition:opacity .4s
  }
  #result-overlay.show{opacity:1;pointer-events:all}
  #result-img{
    max-width:90%;max-height:75vh;border-radius:8px;
    border:2px solid var(--cyan);box-shadow:0 0 60px rgba(0,212,255,.5)
  }
  #result-actions{display:flex;gap:16px;margin-top:20px}
  .result-btn{
    padding:10px 32px;border-radius:6px;font-family:'Bebas Neue';font-size:1.3rem;
    letter-spacing:2px;cursor:pointer;border:2px solid;transition:.15s
  }
  #btn-back{border-color:var(--border);color:var(--text);background:transparent}
  #btn-back:hover{border-color:var(--cyan);color:var(--cyan)}
  #btn-save{border-color:var(--cyan);color:#000;background:var(--cyan)}
  #btn-save:hover{background:var(--pink);border-color:var(--pink)}

  /* ── GENERATING OVERLAY ── */
  #gen-overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:rgba(0,0,0,.8);
    z-index:190;opacity:0;pointer-events:none;transition:opacity .3s
  }
  #gen-overlay.show{opacity:1;pointer-events:all}
  #gen-spinner{
    width:80px;height:80px;border-radius:50%;
    border:4px solid var(--border);border-top-color:var(--cyan);
    animation:spin 1s linear infinite;margin-bottom:20px
  }
  #gen-text{font-family:'Bebas Neue';font-size:2rem;letter-spacing:3px;color:var(--cyan)}
  #gen-sub{font-family:'Space Mono';font-size:.7rem;color:#6a9ab0;margin-top:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── CHARACTER BAR ── */
  #char-bar{
    flex-shrink:0;height:200px;background:rgba(0,0,0,.85);
    border-top:1px solid var(--border);padding:14px 20px;
    display:flex;flex-direction:column;gap:8px
  }
  #bar-label{
    font-family:'Space Mono';font-size:.6rem;letter-spacing:3px;
    color:#3a6a7a;display:flex;justify-content:space-between
  }
  #char-cards{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px}
  #char-cards::-webkit-scrollbar{height:2px}
  #char-cards::-webkit-scrollbar-thumb{background:var(--border)}

  .char-card{
    flex-shrink:0;width:130px;border:1px solid var(--border);border-radius:10px;
    padding:12px 10px;cursor:pointer;transition:.2s;background:var(--card);
    position:relative;text-align:center
  }
  .char-card:hover{border-color:var(--cyan);background:rgba(0,212,255,.06)}
  .char-card.active{border-width:2px}
  .char-card .num{
    position:absolute;top:6px;right:8px;font-family:'Space Mono';
    font-size:.6rem;color:#3a6a7a
  }
  .char-card .emoji{font-size:2rem;display:block;margin-bottom:6px}
  .char-card .cname{font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:1px}
  .char-card .csub{font-size:.6rem;color:#6a9ab0;margin-top:2px;
                    font-family:'Space Mono';white-space:nowrap;overflow:hidden}

  /* ── TOAST ── */
  #toast{
    position:fixed;bottom:220px;left:50%;transform:translateX(-50%);
    background:rgba(0,212,255,.15);border:1px solid var(--cyan);
    padding:10px 24px;border-radius:6px;font-family:'Space Mono';font-size:.75rem;
    color:var(--cyan);opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;
    letter-spacing:1px
  }
  #toast.show{opacity:1}

  /* ── AI BADGE ── */
  #ai-badge{
    position:absolute;top:14px;right:14px;
    background:linear-gradient(135deg,rgba(255,0,128,.3),rgba(0,212,255,.3));
    border:1px solid var(--cyan);border-radius:20px;padding:4px 12px;
    font-family:'Space Mono';font-size:.6rem;letter-spacing:1px;color:var(--cyan);
    display:none
  }

  /* face swap panel */
  #swap-panel{
    position:fixed;bottom:0;left:0;right:0;height:220px;
    background:rgba(5,15,25,.97);border-top:1px solid var(--border);
    z-index:400;transform:translateY(100%);transition:.3s ease
  }
  #swap-panel.open{transform:translateY(0)}
  #swap-inner{padding:16px 20px;height:100%;display:flex;flex-direction:column;gap:10px}
  #swap-header{display:flex;justify-content:space-between;align-items:center}
  #swap-title{font-family:'Space Mono';font-size:.7rem;letter-spacing:2px;color:#6a9ab0}
  #swap-close{background:none;border:1px solid var(--border);color:var(--text);
               padding:4px 12px;border-radius:4px;cursor:pointer;font-size:.7rem}
  #swap-faces{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
  .face-card{
    flex-shrink:0;width:90px;border:2px solid var(--border);border-radius:8px;
    overflow:hidden;cursor:pointer;transition:.2s
  }
  .face-card:hover{border-color:var(--cyan)}
  .face-card.active{border-color:var(--pink)}
  .face-card img{width:100%;height:70px;object-fit:cover;display:block}
  .face-card .flabel{font-size:.6rem;padding:4px;text-align:center;
                      font-family:'Space Mono';white-space:nowrap;overflow:hidden}
  .add-face{
    flex-shrink:0;width:90px;height:100px;border:2px dashed var(--border);
    border-radius:8px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;cursor:pointer;transition:.2s;font-size:.65rem;
    color:#3a6a7a;gap:6px
  }
  .add-face:hover{border-color:var(--cyan);color:var(--cyan)}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="logo"><span>AMD</span><b>ADAPT</b></div>
  <div id="mode-bar">
    <button class="pill active" onclick="setMode('character')">CHARACTER</button>
    <button class="pill" onclick="setMode('minecraft')">MINECRAFT</button>
    <button class="pill" onclick="setMode('cyberpunk')">CYBERPUNK</button>
    <button class="pill" onclick="toggleSwap()">FACE SWAP ↑</button>
    <button class="pill" onclick="setMode('passthrough')">LIVE</button>
  </div>
  <div id="hdr-right">
    <div id="cam-status"><div class="dot" id="cam-dot"></div><span id="cam-txt">CAMERA</span></div>
    <div id="mode-label">NA'VI</div>
  </div>
</div>

<!-- VIDEO -->
<div id="video-wrap">
  <img id="video-feed" src="/video_feed">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div id="char-label">
    <div id="char-name">NA'VI</div>
    <div id="char-sub">AVATAR · PANDORA</div>
  </div>

  <div id="ai-badge">⚡ AI READY</div>

  <!-- GENERATE BUTTON -->
  <button id="gen-btn" onclick="generate()">⚡ TRANSFORM ME</button>

  <!-- GENERATING spinner -->
  <div id="gen-overlay">
    <div id="gen-spinner"></div>
    <div id="gen-text">GENERATING...</div>
    <div id="gen-sub">AI is transforming you into the character</div>
  </div>

  <!-- AI RESULT reveal -->
  <div id="result-overlay">
    <img id="result-img" src="">
    <div id="result-actions">
      <button class="result-btn" id="btn-back" onclick="closeResult()">← TRY AGAIN</button>
      <button class="result-btn" id="btn-save" onclick="saveResult()">💾 SAVE</button>
    </div>
  </div>
</div>

<!-- CHARACTER BAR -->
<div id="char-bar">
  <div id="bar-label">
    <span>CHOOSE YOUR CHARACTER</span>
    <span>Keys 1–6 to switch · ESC = live view</span>
  </div>
  <div id="char-cards"></div>
</div>

<!-- FACE SWAP PANEL -->
<div id="swap-panel">
  <div id="swap-inner">
    <div id="swap-header">
      <div id="swap-title">FACE SWAP LIBRARY — pick a face</div>
      <button id="swap-close" onclick="toggleSwap()">✕ CLOSE</button>
    </div>
    <div id="swap-faces"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let characters = [];
let currentChar = null;
let currentMode = 'character';
let aiReady = false;
let polling = null;

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadCharacters();
  await loadCatalog();
  pollStatus();
  // Select first character
  if (characters.length) selectChar(characters[0].key);
}

async function loadCharacters() {
  const r = await fetch('/characters');
  const d = await r.json();
  characters = d.characters;
  aiReady = characters.some(c => c.ai_ready);
  renderCharCards();
  updateAiBadge();
}

function renderCharCards() {
  const wrap = document.getElementById('char-cards');
  wrap.innerHTML = '';
  characters.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'char-card';
    div.id = `card-${c.key}`;
    div.style.setProperty('--c', c.color);
    div.onclick = () => selectChar(c.key);
    div.innerHTML = `
      <span class="num">${i+1}</span>
      <span class="emoji">${c.emoji}</span>
      <div class="cname" style="color:${c.color}">${c.label}</div>
      <div class="csub">${c.subtitle}</div>`;
    wrap.appendChild(div);
  });
}

function updateAiBadge() {
  const badge = document.getElementById('ai-badge');
  const btn   = document.getElementById('gen-btn');
  if (aiReady && currentMode === 'character') {
    badge.style.display = 'block';
    btn.style.display = 'block';
  } else {
    badge.style.display = 'none';
    btn.style.display = currentMode === 'character' ? 'block' : 'none';
    if (!aiReady && btn.style.display === 'block') {
      btn.textContent = '⚡ TRANSFORM ME';
      btn.title = 'Start ComfyUI for AI quality. See launch_comfy.py';
    }
  }
}

// ── Character selection ───────────────────────────────────────────────────────
function selectChar(key) {
  currentChar = key;
  const cfg = characters.find(c => c.key === key);
  if (!cfg) return;

  // Update cards
  document.querySelectorAll('.char-card').forEach(el => {
    el.classList.remove('active');
    el.style.borderColor = '';
  });
  const card = document.getElementById(`card-${key}`);
  if (card) {
    card.classList.add('active');
    card.style.borderColor = cfg.color;
  }

  // Update header label
  document.getElementById('mode-label').textContent = cfg.label.toUpperCase();

  // Update character overlay
  document.getElementById('char-name').textContent = cfg.label.toUpperCase();
  document.getElementById('char-name').style.color = cfg.color;
  document.getElementById('char-sub').textContent  = cfg.subtitle.toUpperCase();
  const lbl = document.getElementById('char-label');
  lbl.style.display = currentMode === 'character' ? 'block' : 'none';

  // Send to server
  const fd = new FormData();
  fd.append('mode', 'character');
  fd.append('character', key);
  fetch('/set_mode', {method:'POST', body:fd});
}

// ── Mode switching ────────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));

  const labels = {character:'CHARACTER',minecraft:'MINECRAFT',
                  cyberpunk:'CYBERPUNK',faceswap:'FACE SWAP ↑',passthrough:'LIVE'};
  document.querySelectorAll('.pill').forEach(p => {
    const txt = p.textContent.trim();
    if (txt === labels[mode]) p.classList.add('active');
  });

  const fd = new FormData();
  fd.append('mode', mode);
  if (mode === 'character' && currentChar) fd.append('character', currentChar);
  fetch('/set_mode', {method:'POST', body:fd});

  // Show/hide UI elements
  document.getElementById('char-label').style.display =
    mode === 'character' ? 'block' : 'none';
  document.getElementById('gen-btn').style.display =
    mode === 'character' ? 'block' : 'none';
  updateAiBadge();
}

// ── AI Generation ─────────────────────────────────────────────────────────────
async function generate() {
  if (!currentChar) return;
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;

  // Show spinner
  document.getElementById('gen-overlay').classList.add('show');
  document.getElementById('gen-sub').textContent =
    aiReady ? 'AI is transforming you — 2-3 seconds...'
             : 'Processing transform...';

  const fd = new FormData();
  fd.append('character', currentChar);
  try {
    const r = await fetch('/generate', {method:'POST', body:fd});
    const d = await r.json();
    if (d.status === 'generating' || d.status === 'done') {
      startPolling();
    } else {
      showGenError(d.message || 'Failed to start');
    }
  } catch(e) {
    showGenError('Server error');
  }
}

function startPolling() {
  if (polling) clearInterval(polling);
  polling = setInterval(async () => {
    try {
      const r = await fetch('/generate_status');
      const d = await r.json();
      if (d.status === 'done' && d.image) {
        clearInterval(polling); polling = null;
        showResult(d.image);
      } else if (d.status === 'error') {
        clearInterval(polling); polling = null;
        showGenError(d.message || 'Generation failed');
      }
    } catch(e) {}
  }, 500);
}

function showResult(dataUrl) {
  document.getElementById('gen-overlay').classList.remove('show');
  document.getElementById('result-img').src = dataUrl;
  document.getElementById('result-overlay').classList.add('show');
  document.getElementById('gen-btn').disabled = false;
}

function showGenError(msg) {
  document.getElementById('gen-overlay').classList.remove('show');
  document.getElementById('gen-btn').disabled = false;
  toast('Error: ' + msg, 4000);
}

function closeResult() {
  document.getElementById('result-overlay').classList.remove('show');
}

function saveResult() {
  const img = document.getElementById('result-img');
  const a = document.createElement('a');
  a.href = img.src;
  a.download = `amd_adapt_${currentChar}_${Date.now()}.jpg`;
  a.click();
}

// ── Face swap panel ───────────────────────────────────────────────────────────
let swapOpen = false;
function toggleSwap() {
  swapOpen = !swapOpen;
  document.getElementById('swap-panel').classList.toggle('open', swapOpen);
}

async function loadCatalog() {
  const r = await fetch('/catalog');
  const d = await r.json();
  const wrap = document.getElementById('swap-faces');
  wrap.innerHTML = '';
  d.faces.forEach(f => {
    const div = document.createElement('div');
    div.className = 'face-card';
    div.id = `face-${f.key.replace('/','-')}`;
    div.onclick = () => selectFace(f.key, div);
    div.innerHTML = `<img src="/face_thumb?key=${encodeURIComponent(f.key)}" loading="lazy">
                     <div class="flabel">${f.label}</div>`;
    wrap.appendChild(div);
  });
  // Add button
  const add = document.createElement('div');
  add.className = 'add-face';
  add.innerHTML = '<span style="font-size:1.5rem">+</span><span>Add Face</span>';
  add.onclick = () => document.getElementById('file-input').click();
  wrap.appendChild(add);
}

function selectFace(key, el) {
  document.querySelectorAll('.face-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const fd = new FormData();
  fd.append('mode','faceswap');
  fd.append('face_key', key);
  fetch('/set_mode',{method:'POST',body:fd});
  setMode('faceswap');
}

// ── Status polling ────────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const r = await fetch('/status');
    const d = await r.json();
    const dot = document.getElementById('cam-dot');
    dot.className = 'dot' + (d.camera ? ' live' : '');
    document.getElementById('cam-txt').textContent =
      d.camera ? 'CAMERA LIVE' : 'NO CAMERA';
    if (d.ai_ready !== aiReady) {
      aiReady = d.ai_ready;
      updateAiBadge();
    }
  } catch(e) {}
  setTimeout(pollStatus, 2000);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, dur=2000) {
  const el = document.getElementById('toast');
  el.textContent = '✓ ' + msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const n = parseInt(e.key);
  if (n >= 1 && n <= 6 && characters[n-1]) {
    setMode('character');
    selectChar(characters[n-1].key);
  }
  if (e.key.toLowerCase() === 'f') toggleSwap();
  if (e.key === 'Escape') { setMode('passthrough'); closeResult(); }
  if (e.key === 'Enter' && currentMode === 'character') generate();
});

// ── File upload ───────────────────────────────────────────────────────────────
const fileInput = document.createElement('input');
fileInput.id = 'file-input';
fileInput.type = 'file';
fileInput.accept = 'image/*';
fileInput.style.display = 'none';
document.body.appendChild(fileInput);
fileInput.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const label = file.name.replace(/\.[^.]+$/, '').replace(/_/g,' ');
  const fd = new FormData();
  fd.append('file', file);
  fd.append('label', label);
  fd.append('category', 'custom');
  await fetch('/upload_face',{method:'POST',body:fd});
  await loadCatalog();
  toast('Face added: ' + label);
  fileInput.value = '';
});

init();
</script>
</body>
</html>
