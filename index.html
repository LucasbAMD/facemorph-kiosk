<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Avatar Kiosk</title>
<style>
  :root {
    --bg:     #0a0a0a;
    --card:   #141414;
    --border: #222;
    --text:   #f0f0f0;
    --dim:    #666;
    --accent: #00d4ff;
    --red:    #ED1C24;
    --green:  #22dd44;
    --gold:   #ffcc00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden; user-select: none;
  }
  body { display: flex; flex-direction: column; }

  /* ── Header ── */
  header {
    height: 52px; min-height: 52px; display: flex;
    align-items: center; justify-content: space-between;
    padding: 0 24px; background: #111;
    border-bottom: 2px solid var(--red); flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-badge {
    background: var(--red); color: #fff; font-weight: 900;
    font-size: 1rem; padding: 3px 10px; letter-spacing: 2px;
  }
  .logo-text {
    font-size: 1rem; font-weight: 300;
    letter-spacing: 4px; color: #bbb;
  }
  #ai-badge {
    font-size: 0.72rem; padding: 4px 12px; border-radius: 20px;
    background: #1a1a1a; border: 1px solid #444; color: #555;
    transition: all 0.3s;
  }
  #ai-badge.online { border-color: var(--green); color: var(--green); }

  /* ── Layout ── */
  #main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

  /* ── Camera panel ── */
  #cam-panel {
    flex: 1; position: relative; background: #000;
    overflow: hidden; cursor: crosshair; min-width: 0;
  }
  #feed {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; display: block;
  }

  /* Overlays */
  .overlay {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center;
    justify-content: center; gap: 16px; z-index: 10;
  }
  .overlay.on { display: flex; }
  #gen-overlay { background: rgba(0,0,0,0.82); }
  #result-overlay { background: rgba(0,0,0,0.94); }

  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #333; border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #gen-msg { color: var(--accent); font-size: 0.95rem; letter-spacing: 1px; }
  .progress-wrap {
    width: 300px; max-width: 80%; background: #222;
    border-radius: 8px; height: 6px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 0%; background: var(--accent);
    border-radius: 8px; transition: width 0.4s ease;
  }
  #progress-label { font-size: 0.68rem; color: #555; letter-spacing: 1px; }
  #elapsed { font-size: 0.6rem; color: #333; }

  /* Result */
  #result-img { max-height: 76vh; max-width: 92%; border-radius: 8px; }
  .result-btns { display: flex; gap: 10px; }
  .result-btns button {
    padding: 12px 28px; border: none; border-radius: 6px;
    font-size: 0.9rem; font-weight: 700; letter-spacing: 1px;
    cursor: pointer;
  }
  #save-btn { background: var(--green); color: #000; }
  #close-btn { background: var(--red); color: #fff; }

  /* Selection badges */
  #sel-badge {
    position: absolute; top: 12px; left: 12px;
    background: var(--accent); color: #000;
    font-weight: 700; font-size: 0.8rem;
    padding: 5px 12px; border-radius: 20px;
    display: none; z-index: 5;
  }
  #sel-badge.on { display: block; }
  #clear-btn {
    position: absolute; top: 12px; left: 12px;
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent); font-size: 0.75rem;
    padding: 5px 12px; border-radius: 20px;
    cursor: pointer; display: none; z-index: 5;
  }
  #clear-btn.on { display: block; }

  /* Known face tags */
  #known-tags {
    position: absolute; bottom: 12px; left: 12px;
    display: flex; flex-wrap: wrap; gap: 5px;
    max-width: 55%; z-index: 5;
  }
  .known-tag {
    background: rgba(0,0,0,0.75); border: 1px solid var(--gold);
    color: var(--gold); border-radius: 20px; font-size: 0.7rem;
    padding: 3px 10px;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 280px; min-width: 280px; background: var(--card);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sec-title {
    font-size: 0.6rem; letter-spacing: 3px; color: var(--dim);
    text-transform: uppercase; padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }

  /* Known hosts */
  #hosts-section {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #hosts-section .sec-title { padding: 0 0 8px; border-bottom: none; }
  #hosts-list {
    display: flex; flex-direction: column; gap: 5px;
    max-height: 120px; overflow-y: auto;
  }
  .host-row {
    display: flex; align-items: center; justify-content: space-between;
    background: #1a1a1a; border-radius: 6px; padding: 7px 10px;
    border: 1px solid #252525;
  }
  .host-row.here { border-color: var(--gold); background: rgba(255,204,0,0.04); }
  .host-info { display: flex; align-items: center; gap: 8px; }
  .host-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #0066aa);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700; color: #000; flex-shrink: 0;
  }
  .host-name { font-size: 0.8rem; font-weight: 600; }
  .host-row.here .host-name { color: var(--gold); }
  .host-status { font-size: 0.6rem; color: #555; }
  .host-row.here .host-status { color: var(--green); }
  .host-del {
    background: transparent; border: none; color: #444;
    font-size: 0.7rem; cursor: pointer; padding: 3px 5px;
  }
  .host-del:hover { color: var(--red); }
  #add-host-btn {
    width: 100%; margin-top: 7px; padding: 7px;
    background: transparent; border: 1px dashed #333;
    color: #555; border-radius: 6px; font-size: 0.72rem;
    cursor: pointer; letter-spacing: 1px;
  }
  #add-host-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Style grid ── */
  .sec-title.styles { border-bottom: none; padding-bottom: 6px; }
  #style-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; padding: 0 14px 14px; flex-shrink: 0;
  }
  .style-card {
    background: #1a1a1a; border: 2px solid #2a2a2a; border-radius: 10px;
    padding: 16px 8px; text-align: center; cursor: pointer;
    transition: all 0.15s;
  }
  .style-card:hover { border-color: #444; background: #222; }
  .style-card.active { border-color: var(--accent); background: rgba(0,212,255,0.06); }
  .style-card.active .style-name { color: var(--accent); }
  .style-emoji { font-size: 2rem; margin-bottom: 6px; }
  .style-name { font-size: 0.82rem; font-weight: 700; letter-spacing: 0.5px; }
  .style-sub { font-size: 0.6rem; color: var(--dim); margin-top: 3px; }
  .style-card.ready .style-name::after {
    content: " \2726"; color: var(--accent); font-size: 0.6rem;
  }

  /* ── Transform button area ── */
  #action-section {
    padding: 14px; border-top: 1px solid var(--border);
    flex-shrink: 0; margin-top: auto;
  }
  #sel-status {
    font-size: 0.7rem; color: var(--dim);
    text-align: center; padding: 0 0 10px; min-height: 18px;
  }
  #sel-status.has { color: var(--accent); }
  #name-btn {
    width: 100%; padding: 9px; margin-bottom: 8px;
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent); border-radius: 8px;
    font-size: 0.78rem; font-weight: 700; letter-spacing: 1px;
    cursor: pointer; display: none; text-transform: uppercase;
  }
  #name-btn:hover { background: rgba(0,212,255,0.06); }
  #transform-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--red), #cc1520);
    color: #fff; border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 800; letter-spacing: 2px;
    cursor: pointer; text-transform: uppercase;
    transition: opacity 0.15s;
  }
  #transform-btn:hover { opacity: 0.9; }
  #transform-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Name modal */
  #name-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  #name-modal.on { display: flex; }
  #name-dialog {
    background: var(--card); border: 1px solid var(--accent);
    border-radius: 12px; padding: 22px 24px; width: 300px;
    display: flex; flex-direction: column; gap: 14px;
    box-shadow: 0 8px 40px rgba(0,212,255,0.2);
  }
  #name-dialog h4 { font-size: 0.85rem; color: var(--accent); letter-spacing: 1px; }
  #name-dialog p { font-size: 0.72rem; color: #888; line-height: 1.5; }
  #name-input {
    background: #1a1a1a; border: 1px solid #444; border-radius: 6px;
    color: #fff; padding: 10px 12px; font-size: 0.95rem; outline: none; width: 100%;
  }
  #name-input:focus { border-color: var(--accent); }
  .gender-row {
    display: flex; gap: 10px; align-items: center;
    font-size: 0.75rem; color: #888;
  }
  .gender-row label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .dialog-btns { display: flex; gap: 8px; }
  .dialog-btns button {
    flex: 1; padding: 10px; border: none; border-radius: 6px;
    cursor: pointer; font-size: 0.82rem; font-weight: 700;
  }
  #nd-save { background: var(--accent); color: #000; }
  #nd-cancel { background: #2a2a2a; color: #ccc; }

  /* Toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #fff; padding: 10px 24px; border-radius: 8px;
    font-size: 0.82rem; display: none; z-index: 99;
    white-space: nowrap; pointer-events: none;
  }
  #toast.on { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <span class="logo-badge">AMD</span>
    <span class="logo-text">AI AVATAR KIOSK</span>
  </div>
  <div id="ai-badge">AI ENGINE</div>
</header>

<!-- Main -->
<div id="main">

  <!-- Camera -->
  <div id="cam-panel">
    <img id="feed" src="/video_feed" alt="Live Feed">
    <div id="sel-badge"></div>
    <button id="clear-btn" onclick="clearSel()">Clear</button>
    <div id="known-tags"></div>

    <!-- Generating overlay -->
    <div id="gen-overlay" class="overlay">
      <div class="spinner"></div>
      <div id="gen-msg">Creating your avatar...</div>
      <div class="progress-wrap"><div id="progress-bar"></div></div>
      <div id="progress-label">Starting AI engine...</div>
      <div id="elapsed">0s</div>
    </div>

    <!-- Result overlay -->
    <div id="result-overlay" class="overlay">
      <img id="result-img" src="" alt="Result">
      <div class="result-btns">
        <button id="save-btn" onclick="savePhoto()">Save Photo</button>
        <button id="close-btn" onclick="closeResult()">Back to Camera</button>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <!-- Known Hosts -->
    <div id="hosts-section">
      <div class="sec-title">Known Hosts</div>
      <div id="hosts-list">
        <div style="font-size:0.68rem;color:#444;padding:6px 2px;">
          No hosts yet. Click your face, then "Register Face".
        </div>
      </div>
      <button id="add-host-btn" onclick="nameSelected()">+ Register Your Face</button>
    </div>

    <!-- Style selector -->
    <div class="sec-title styles">Choose Your Style</div>
    <div id="style-grid"></div>

    <!-- Actions -->
    <div id="action-section">
      <div id="sel-status">Select a person to transform</div>
      <button id="name-btn" onclick="nameSelected()">Name Selected Person</button>
      <button id="transform-btn" onclick="doTransform()">GENERATE AVATAR</button>
    </div>
  </div>
</div>

<!-- Name dialog -->
<div id="name-modal">
  <div id="name-dialog">
    <h4>REGISTER YOUR FACE</h4>
    <p>Enter your name and the kiosk will recognize you automatically.</p>
    <input id="name-input" type="text" placeholder="Enter your name..." maxlength="30"
           onkeydown="if(event.key==='Enter') saveName()">
    <div class="gender-row">
      <span>I am:</span>
      <label><input type="radio" name="nd-gender" value="male"> Male</label>
      <label><input type="radio" name="nd-gender" value="female"> Female</label>
    </div>
    <div class="dialog-btns">
      <button id="nd-save" onclick="saveName()">Save</button>
      <button id="nd-cancel" onclick="closeName()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Styles ───────────────────────────────────────────────────────────────────
const STYLES = [
  { key: "avatar",     emoji: "\uD83D\uDD35", name: "Avatar",     sub: "Blue Alien \u00B7 Pandora" },
  { key: "claymation", emoji: "\uD83C\uDFA8", name: "Claymation", sub: "Clay \u00B7 Stop Motion" },
  { key: "anime",      emoji: "\u2728",       name: "Anime",      sub: "Ghibli \u00B7 Cel Shaded" },
  { key: "ghost",      emoji: "\uD83D\uDC7B", name: "Ghost",      sub: "Spectral \u00B7 Ethereal" },
];

let selectedStyle = "avatar";
let selCount = 0;
let faceCount = 0;
let pendingNameIdx = null;
let pollTimer = null;
let lastFaces = [];
let currentResultDataUrl = null;
let recognizedNow = new Set();

// ── Build style grid ─────────────────────────────────────────────────────────
function buildStyleGrid(aiReady) {
  const grid = document.getElementById("style-grid");
  grid.innerHTML = STYLES.map(s => `
    <div class="style-card${s.key === selectedStyle ? " active" : ""}${aiReady ? " ready" : ""}"
         onclick="selectStyle('${s.key}', this)" data-key="${s.key}">
      <div class="style-emoji">${s.emoji}</div>
      <div class="style-name">${s.name}</div>
      <div class="style-sub">${s.sub}</div>
    </div>`).join("");
}

function selectStyle(key, el) {
  selectedStyle = key;
  document.querySelectorAll(".style-card").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
}

// ── AI status ────────────────────────────────────────────────────────────────
async function checkAI() {
  try {
    const r = await fetch("/comfy_status");
    const d = await r.json();
    const b = document.getElementById("ai-badge");
    b.textContent = d.available ? "AI ENGINE READY" : "AI ENGINE LOADING...";
    b.classList.toggle("online", !!d.available);
    return d.available;
  } catch { return false; }
}

// ── Click to select person ───────────────────────────────────────────────────
function getImageCoords(e) {
  const feed = document.getElementById("feed");
  const rect = feed.getBoundingClientRect();
  const natW = feed.naturalWidth || 1280;
  const natH = feed.naturalHeight || 720;
  const imgAR = natW / natH;
  const boxAR = rect.width / rect.height;
  let imgW, imgH, offX, offY;
  if (imgAR > boxAR) {
    imgW = rect.width; imgH = rect.width / imgAR;
    offX = 0; offY = (rect.height - imgH) / 2;
  } else {
    imgH = rect.height; imgW = rect.height * imgAR;
    offX = (rect.width - imgW) / 2; offY = 0;
  }
  const cx = e.clientX - rect.left - offX;
  const cy = e.clientY - rect.top - offY;
  if (cx < 0 || cy < 0 || cx > imgW || cy > imgH) return null;
  return { clickX: cx, clickY: cy, frameW: imgW, frameH: imgH };
}

document.getElementById("cam-panel").addEventListener("click", async function(e) {
  if (e.target.closest("button")) return;
  if (e.target.id === "result-img") return;
  if (document.getElementById("result-overlay").classList.contains("on")) return;
  if (document.getElementById("gen-overlay").classList.contains("on")) return;
  if (document.getElementById("name-modal").classList.contains("on")) { closeName(); return; }

  const coords = getImageCoords(e);
  if (!coords) return;

  const fd = new FormData();
  fd.append("click_x", coords.clickX);
  fd.append("click_y", coords.clickY);
  fd.append("frame_w", coords.frameW);
  fd.append("frame_h", coords.frameH);

  try {
    const r = await fetch("/select_person", { method: "POST", body: fd });
    const data = await r.json();
    updateSelUI(data.faces);
  } catch {}
});

// ── Selection UI ─────────────────────────────────────────────────────────────
function updateSelUI(faces) {
  lastFaces = faces || [];
  faceCount = lastFaces.length;
  selCount = lastFaces.filter(f => f.selected).length;

  const badge = document.getElementById("sel-badge");
  const clrBtn = document.getElementById("clear-btn");
  const status = document.getElementById("sel-status");
  const nameBtn = document.getElementById("name-btn");

  if (selCount > 0) {
    badge.textContent = selCount + " selected";
    badge.classList.add("on");
    clrBtn.classList.add("on");
    status.textContent = "Ready to generate avatar";
    status.className = "has";
    nameBtn.style.display = "block";
  } else {
    badge.classList.remove("on");
    clrBtn.classList.remove("on");
    status.textContent = faceCount > 0 ? "Click a person to select" : "No faces detected";
    status.className = "";
    nameBtn.style.display = "none";
  }
}

async function clearSel() {
  await fetch("/clear_selection", { method: "POST" });
  updateSelUI([]);
}

// ── Name dialog ──────────────────────────────────────────────────────────────
function nameSelected() {
  const face = lastFaces.find(f => f.selected);
  if (face) {
    pendingNameIdx = face.index;
    document.getElementById("name-input").value = face.name || "";
    document.getElementById("name-modal").classList.add("on");
    setTimeout(() => document.getElementById("name-input").focus(), 80);
  } else {
    toast("Click your face on the camera first");
  }
}

function closeName() {
  document.getElementById("name-modal").classList.remove("on");
  pendingNameIdx = null;
}

async function saveName() {
  const name = document.getElementById("name-input").value.trim();
  if (!name) { toast("Please enter a name"); return; }
  if (pendingNameIdx === null) { closeName(); return; }

  const genderEl = document.querySelector('input[name="nd-gender"]:checked');
  const gender = genderEl ? genderEl.value : "unknown";

  const fd = new FormData();
  fd.append("index", pendingNameIdx);
  fd.append("name", name);
  fd.append("gender", gender);

  try {
    const r = await fetch("/name_face", { method: "POST", body: fd });
    const data = await r.json();
    if (data.status === "ok") {
      toast("Saved! " + name + " will be recognized automatically", "ok");
      refreshHosts();
      closeName();
    } else {
      toast("Could not save - click your face first");
    }
  } catch (e) {
    toast("Connection error");
  }
}

document.getElementById("name-modal").addEventListener("click", function(e) {
  if (e.target === this) closeName();
});

// ── Known Hosts ──────────────────────────────────────────────────────────────
async function refreshHosts() {
  try {
    const r = await fetch("/known_names");
    const data = await r.json();
    const names = Object.values(data.names);
    const list = document.getElementById("hosts-list");
    const tags = document.getElementById("known-tags");

    if (names.length === 0) {
      list.innerHTML = '<div style="font-size:0.68rem;color:#444;padding:6px 2px;">No hosts yet.</div>';
      tags.innerHTML = "";
      return;
    }

    list.innerHTML = names.map(n => {
      const initials = n.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
      const here = recognizedNow.has(n);
      return `
        <div class="host-row${here ? " here" : ""}">
          <div class="host-info">
            <div class="host-avatar">${initials}</div>
            <div>
              <div class="host-name">${n}</div>
              <div class="host-status">${here ? "In frame" : "Not detected"}</div>
            </div>
          </div>
          <button class="host-del" onclick="forgetHost('${n}',event)">x</button>
        </div>`;
    }).join("");

    tags.innerHTML = names.filter(n => recognizedNow.has(n)).map(n =>
      `<div class="known-tag">${n}</div>`
    ).join("");
  } catch {}
}

async function forgetHost(name, e) {
  e.stopPropagation();
  if (!confirm("Remove " + name + "?")) return;
  const fd = new FormData();
  fd.append("name", name);
  await fetch("/forget_face", { method: "POST", body: fd });
  recognizedNow.delete(name);
  toast("Removed " + name);
  refreshHosts();
}

async function pollRecognized() {
  try {
    const r = await fetch("/faces");
    const data = await r.json();
    const prev = new Set(recognizedNow);
    recognizedNow.clear();
    (data.faces || []).forEach(f => { if (f.name) recognizedNow.add(f.name); });

    let changed = recognizedNow.size !== prev.size;
    if (!changed) for (const n of recognizedNow) if (!prev.has(n)) { changed = true; break; }
    if (changed) refreshHosts();
  } catch {}
}

// ── Save photo ───────────────────────────────────────────────────────────────
function savePhoto() {
  if (!currentResultDataUrl) return;
  const ts = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
  const name = "avatar_" + selectedStyle + "_" + ts + ".jpg";
  const a = document.createElement("a");
  a.href = currentResultDataUrl;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast("Photo saved!", "ok");
}

// ── Transform + progress ─────────────────────────────────────────────────────
let genStart = 0;
let progressTmr = null;
let elapsedTmr = null;
let stageIdx = 0;

const STAGES = [
  { pct: 5,  label: "Analyzing face..." },
  { pct: 20, label: "Generating avatar..." },
  { pct: 45, label: "Applying style..." },
  { pct: 65, label: "Refining details..." },
  { pct: 82, label: "Almost there..." },
  { pct: 95, label: "Final touches..." },
];
const STAGE_TIMES = [1500, 3000, 4000, 4000, 3000, 3000];

function setProgress(pct, label) {
  document.getElementById("progress-bar").style.width = pct + "%";
  if (label) document.getElementById("progress-label").textContent = label;
}

function startProgress() {
  stageIdx = 0;
  genStart = Date.now();
  setProgress(0, "Starting AI engine...");

  function advance() {
    if (stageIdx >= STAGES.length) return;
    const s = STAGES[stageIdx];
    setProgress(s.pct, s.label);
    stageIdx++;
    if (stageIdx < STAGES.length)
      progressTmr = setTimeout(advance, STAGE_TIMES[stageIdx - 1] || 3000);
  }
  advance();

  elapsedTmr = setInterval(() => {
    const s = Math.floor((Date.now() - genStart) / 1000);
    document.getElementById("elapsed").textContent = s + "s";
  }, 1000);
}

function stopProgress() {
  if (progressTmr) { clearTimeout(progressTmr); progressTmr = null; }
  if (elapsedTmr) { clearInterval(elapsedTmr); elapsedTmr = null; }
}

async function doTransform() {
  const btn = document.getElementById("transform-btn");
  btn.disabled = true;

  const online = await checkAI();
  if (!online) {
    toast("AI Engine still loading - please wait");
    btn.disabled = false;
    return;
  }

  document.getElementById("gen-overlay").classList.add("on");
  document.getElementById("gen-msg").textContent =
    "Creating your " + STYLES.find(s => s.key === selectedStyle).name + " avatar...";
  startProgress();

  const fd = new FormData();
  fd.append("character", selectedStyle);
  try {
    const r = await fetch("/generate", { method: "POST", body: fd });
    if (r.status === 400) {
      const d = await r.json();
      stopProgress();
      document.getElementById("gen-overlay").classList.remove("on");
      toast(d.detail || "Select a person first");
      btn.disabled = false;
      return;
    }
    const data = await r.json();
    if (data.status === "generating" || data.status === "busy") {
      pollTimer = setInterval(pollStatus, 1200);
    } else {
      stopProgress();
      document.getElementById("gen-overlay").classList.remove("on");
      toast(data.message || "Error");
      btn.disabled = false;
    }
  } catch {
    stopProgress();
    document.getElementById("gen-overlay").classList.remove("on");
    toast("Connection error");
    btn.disabled = false;
  }
}

async function pollStatus() {
  try {
    const r = await fetch("/generate_status");
    const data = await r.json();
    if (data.status === "done" && data.image) {
      clearInterval(pollTimer);
      stopProgress();
      setProgress(100, "Done!");
      setTimeout(() => {
        document.getElementById("gen-overlay").classList.remove("on");
        currentResultDataUrl = data.image;
        document.getElementById("result-img").src = data.image;
        document.getElementById("result-overlay").classList.add("on");
        document.getElementById("transform-btn").disabled = false;
      }, 300);
    } else if (data.status === "error") {
      clearInterval(pollTimer);
      stopProgress();
      document.getElementById("gen-overlay").classList.remove("on");
      toast("Error: " + (data.message || "unknown"));
      document.getElementById("transform-btn").disabled = false;
    }
  } catch {}
}

function closeResult() {
  document.getElementById("result-overlay").classList.remove("on");
  document.getElementById("result-img").src = "";
  currentResultDataUrl = null;
}

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = type === "ok" ? "#1a7a3a" : "#c0392b";
  t.classList.add("on");
  setTimeout(() => t.classList.remove("on"), 3500);
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  buildStyleGrid(false);
  const online = await checkAI();
  buildStyleGrid(online);
  setInterval(checkAI, 8000);
  setInterval(pollRecognized, 2000);
  refreshHosts();
}
init();
</script>
