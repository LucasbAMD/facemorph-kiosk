<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMD-Adapt</title>
<style>
  :root {
    --bg:     #0a0a0a;
    --card:   #141414;
    --border: #222;
    --text:   #f0f0f0;
    --dim:    #666;
    --accent: #00d4ff;
    --red:    #ED1C24;
    --green:  #22dd44;
    --gold:   #ffcc00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden; user-select: none;
  }
  body { display: flex; flex-direction: column; }

  /* ── Header ── */
  header {
    height: 52px; min-height: 52px; display: flex;
    align-items: center; justify-content: space-between;
    padding: 0 24px; background: #111;
    border-bottom: 2px solid var(--red); flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-badge {
    background: var(--red); color: #fff; font-weight: 900;
    font-size: 1rem; padding: 3px 10px; letter-spacing: 2px;
  }
  .logo-text {
    font-size: 1rem; font-weight: 300;
    letter-spacing: 4px; color: #bbb;
  }
  #ai-badge {
    font-size: 0.72rem; padding: 4px 12px; border-radius: 20px;
    background: #1a1a1a; border: 1px solid #444; color: #555;
    transition: all 0.3s;
  }
  #ai-badge.online { border-color: var(--green); color: var(--green); }

  /* ── Layout ── */
  #main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

  /* ── Camera panel ── */
  #cam-panel {
    flex: 1; position: relative; background: #000;
    overflow: hidden; min-width: 0;
  }
  #feed {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; display: block;
  }

  /* Overlays */
  .overlay {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center;
    justify-content: center; gap: 16px; z-index: 10;
  }
  .overlay.on { display: flex; }
  #gen-overlay { background: rgba(0,0,0,0.82); }
  #result-overlay { background: rgba(0,0,0,0.94); }

  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #333; border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #gen-msg { color: var(--accent); font-size: 0.95rem; letter-spacing: 1px; }
  .progress-wrap {
    width: 300px; max-width: 80%; background: #222;
    border-radius: 8px; height: 6px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 0%; background: var(--accent);
    border-radius: 8px; transition: width 0.4s ease;
  }
  #progress-label { font-size: 0.68rem; color: #555; letter-spacing: 1px; }
  #elapsed { font-size: 0.6rem; color: #333; }

  /* Result */
  #result-img { max-height: 76vh; max-width: 92%; border-radius: 8px; }
  .result-btns { display: flex; gap: 10px; }
  .result-btns button {
    padding: 12px 28px; border: none; border-radius: 6px;
    font-size: 0.9rem; font-weight: 700; letter-spacing: 1px;
    cursor: pointer;
  }
  #save-btn { background: var(--green); color: #000; }
  #close-btn { background: var(--red); color: #fff; }

  /* ── Sidebar ── */
  #sidebar {
    width: 280px; min-width: 280px; background: var(--card);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sec-title {
    font-size: 0.6rem; letter-spacing: 3px; color: var(--dim);
    text-transform: uppercase; padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }

  /* ── Style grid ── */
  .sec-title.styles { border-bottom: none; padding-bottom: 6px; }
  #style-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; padding: 0 14px 14px; flex: 1; min-height: 0;
    overflow-y: auto; align-content: start;
  }
  .style-card {
    background: #1a1a1a; border: 2px solid #2a2a2a; border-radius: 10px;
    padding: 10px 6px; text-align: center; cursor: pointer;
    transition: all 0.15s;
  }
  .style-card:hover { border-color: #444; background: #222; }
  .style-card.active { border-color: var(--accent); background: rgba(0,212,255,0.06); }
  .style-card.active .style-name { color: var(--accent); }
  .style-emoji { font-size: 1.5rem; margin-bottom: 4px; }
  .style-name { font-size: 0.76rem; font-weight: 700; letter-spacing: 0.5px; }
  .style-sub { font-size: 0.55rem; color: var(--dim); margin-top: 2px; }
  .style-card.ready .style-name::after {
    content: " \2726"; color: var(--accent); font-size: 0.6rem;
  }

  /* ── Transform button area ── */
  #action-section {
    padding: 14px; border-top: 1px solid var(--border);
    flex-shrink: 0; margin-top: auto;
  }
  /* Gender selector */
  #gender-row {
    display: flex; gap: 6px; margin-bottom: 10px;
  }
  #gender-row .g-btn {
    flex: 1; padding: 8px 4px; border: 1px solid #333; border-radius: 6px;
    background: #1a1a1a; color: #888; font-size: 0.72rem; font-weight: 700;
    letter-spacing: 1px; cursor: pointer; text-align: center;
    text-transform: uppercase; transition: all 0.15s;
  }
  #gender-row .g-btn:hover { border-color: #555; color: #aaa; }
  #gender-row .g-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.06); }

  #transform-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--red), #cc1520);
    color: #fff; border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 800; letter-spacing: 2px;
    cursor: pointer; text-transform: uppercase;
    transition: opacity 0.15s;
  }
  #transform-btn:hover { opacity: 0.9; }
  #transform-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  #mode-label {
    font-size: 0.6rem; color: #444; text-align: center;
    padding: 8px 0 0; letter-spacing: 1px;
  }
  #mode-label span { color: var(--accent); }

  /* Toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #fff; padding: 10px 24px; border-radius: 8px;
    font-size: 0.82rem; display: none; z-index: 99;
    white-space: nowrap; pointer-events: none;
  }
  #toast.on { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <span class="logo-badge">AMD</span>
    <span class="logo-text">ADAPT</span>
  </div>
  <div id="ai-badge">AI ENGINE</div>
</header>

<!-- Main -->
<div id="main">

  <!-- Camera -->
  <div id="cam-panel">
    <img id="feed" src="/video_feed" alt="Live Feed">

    <!-- Generating overlay -->
    <div id="gen-overlay" class="overlay">
      <div class="spinner"></div>
      <div id="gen-msg">Transforming scene...</div>
      <div class="progress-wrap"><div id="progress-bar"></div></div>
      <div id="progress-label">Starting AI engine...</div>
      <div id="elapsed">0s</div>
    </div>

    <!-- Result overlay -->
    <div id="result-overlay" class="overlay">
      <img id="result-img" src="" alt="Result">
      <div class="result-btns">
        <button id="save-btn" onclick="savePhoto()">Save Photo</button>
        <button id="close-btn" onclick="closeResult()">Back to Camera</button>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <!-- Style selector -->
    <div class="sec-title styles">Choose Your Style</div>
    <div id="style-grid"></div>

    <!-- Actions -->
    <div id="action-section">
      <div id="gender-row">
        <button class="g-btn" onclick="setGender('male',this)">Male</button>
        <button class="g-btn" onclick="setGender('female',this)">Female</button>
      </div>
      <button id="transform-btn" onclick="doTransform()">TRANSFORM SCENE</button>
      <div id="mode-label"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Styles ───────────────────────────────────────────────────────────────────
const STYLES = [
  { key: "avatar",      emoji: "\uD83D\uDD35", name: "Avatar",      sub: "Blue Alien \u00B7 Pandora" },
  { key: "anime",       emoji: "\u2728",       name: "Anime",       sub: "Cel Shaded \u00B7 Manga" },
  { key: "cyberpunk",   emoji: "\uD83E\uDD16", name: "Cyberpunk",   sub: "Neon \u00B7 Chrome \u00B7 Future" },
  { key: "claymation",  emoji: "\uD83C\uDFA8", name: "Claymation",  sub: "Clay \u00B7 Stop Motion" },
  { key: "oilpainting", emoji: "\uD83D\uDDBC\uFE0F", name: "Oil Painting", sub: "Renaissance \u00B7 Brushstrokes" },
  { key: "comicbook",   emoji: "\uD83D\uDCA5", name: "Comic Book",  sub: "Bold Ink \u00B7 Halftone" },
  { key: "pixelart",    emoji: "\uD83D\uDC7E", name: "Pixel Art",   sub: "Retro \u00B7 16-Bit" },
  { key: "steampunk",   emoji: "\u2699\uFE0F", name: "Steampunk",   sub: "Brass \u00B7 Gears \u00B7 Victorian" },
];

let selectedStyle = "avatar";
let selectedGender = "unknown";
let pollTimer = null;
let currentResultDataUrl = null;

// ── Build style grid ─────────────────────────────────────────────────────────
function buildStyleGrid(aiReady) {
  const grid = document.getElementById("style-grid");
  grid.innerHTML = STYLES.map(s => `
    <div class="style-card${s.key === selectedStyle ? " active" : ""}${aiReady ? " ready" : ""}"
         onclick="selectStyle('${s.key}', this)" data-key="${s.key}">
      <div class="style-emoji">${s.emoji}</div>
      <div class="style-name">${s.name}</div>
      <div class="style-sub">${s.sub}</div>
    </div>`).join("");
}

function selectStyle(key, el) {
  selectedStyle = key;
  document.querySelectorAll(".style-card").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
}

function setGender(g, el) {
  if (selectedGender === g) {
    selectedGender = "unknown";
    el.classList.remove("active");
  } else {
    selectedGender = g;
    document.querySelectorAll("#gender-row .g-btn").forEach(b => b.classList.remove("active"));
    el.classList.add("active");
  }
}

// ── AI status ────────────────────────────────────────────────────────────────
async function checkAI() {
  try {
    const r = await fetch("/comfy_status");
    const d = await r.json();
    const b = document.getElementById("ai-badge");
    b.textContent = d.available ? "AI ENGINE READY" : "AI ENGINE LOADING...";
    b.classList.toggle("online", !!d.available);
    // Show pipeline mode
    const ml = document.getElementById("mode-label");
    if (d.mode) ml.innerHTML = "Pipeline: <span>" + d.mode + "</span>";
    return d.available;
  } catch { return false; }
}

// ── Save photo ───────────────────────────────────────────────────────────────
function savePhoto() {
  if (!currentResultDataUrl) return;
  const ts = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
  const name = "scene_" + selectedStyle + "_" + ts + ".jpg";
  const a = document.createElement("a");
  a.href = currentResultDataUrl;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast("Photo saved!", "ok");
}

// ── Transform + progress ─────────────────────────────────────────────────────
let genStart = 0;
let progressTmr = null;
let elapsedTmr = null;
let stageIdx = 0;

const STAGES = [
  { pct: 5,  label: "Capturing scene..." },
  { pct: 12, label: "Analyzing depth..." },
  { pct: 25, label: "Transforming scene..." },
  { pct: 45, label: "Applying style..." },
  { pct: 60, label: "Rendering details..." },
  { pct: 75, label: "Refining composition..." },
  { pct: 88, label: "Almost there..." },
  { pct: 95, label: "Final touches..." },
];
const STAGE_TIMES = [1500, 2500, 4000, 4000, 4000, 4000, 3000, 3000];

function setProgress(pct, label) {
  document.getElementById("progress-bar").style.width = pct + "%";
  if (label) document.getElementById("progress-label").textContent = label;
}

function startProgress() {
  stageIdx = 0;
  genStart = Date.now();
  setProgress(0, "Starting AI engine...");

  function advance() {
    if (stageIdx >= STAGES.length) return;
    const s = STAGES[stageIdx];
    setProgress(s.pct, s.label);
    stageIdx++;
    if (stageIdx < STAGES.length)
      progressTmr = setTimeout(advance, STAGE_TIMES[stageIdx - 1] || 3000);
  }
  advance();

  elapsedTmr = setInterval(() => {
    const s = Math.floor((Date.now() - genStart) / 1000);
    document.getElementById("elapsed").textContent = s + "s";
  }, 1000);
}

function stopProgress() {
  if (progressTmr) { clearTimeout(progressTmr); progressTmr = null; }
  if (elapsedTmr) { clearInterval(elapsedTmr); elapsedTmr = null; }
}

async function doTransform() {
  const btn = document.getElementById("transform-btn");
  btn.disabled = true;

  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

  const online = await checkAI();
  if (!online) {
    toast("AI Engine still loading - please wait");
    btn.disabled = false;
    return;
  }

  document.getElementById("gen-overlay").classList.add("on");
  document.getElementById("gen-msg").textContent =
    "Transforming scene into " + STYLES.find(s => s.key === selectedStyle).name + "...";
  startProgress();

  const fd = new FormData();
  fd.append("character", selectedStyle);
  fd.append("gender", selectedGender);
  try {
    const r = await fetch("/generate", { method: "POST", body: fd });
    if (r.status >= 400) {
      const d = await r.json();
      stopProgress();
      document.getElementById("gen-overlay").classList.remove("on");
      toast(d.detail || "Error starting generation");
      btn.disabled = false;
      return;
    }
    const data = await r.json();
    if (data.status === "generating" || data.status === "busy") {
      pollTimer = setInterval(pollStatus, 1200);
    } else {
      stopProgress();
      document.getElementById("gen-overlay").classList.remove("on");
      toast(data.message || "Error");
      btn.disabled = false;
    }
  } catch {
    stopProgress();
    document.getElementById("gen-overlay").classList.remove("on");
    toast("Connection error");
    btn.disabled = false;
  }
}

async function pollStatus() {
  try {
    const r = await fetch("/generate_status");
    const data = await r.json();
    if (data.status === "done" && data.image) {
      clearInterval(pollTimer); pollTimer = null;
      stopProgress();
      setProgress(100, "Done!");
      setTimeout(() => {
        document.getElementById("gen-overlay").classList.remove("on");
        currentResultDataUrl = data.image;
        document.getElementById("result-img").src = data.image;
        document.getElementById("result-overlay").classList.add("on");
        document.getElementById("transform-btn").disabled = false;
      }, 300);
    } else if (data.status === "error") {
      clearInterval(pollTimer); pollTimer = null;
      stopProgress();
      document.getElementById("gen-overlay").classList.remove("on");
      toast("Error: " + (data.message || "unknown"));
      document.getElementById("transform-btn").disabled = false;
    } else if (data.status === "idle") {
      clearInterval(pollTimer); pollTimer = null;
    }
  } catch {}
}

function closeResult() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  document.getElementById("result-overlay").classList.remove("on");
  document.getElementById("result-img").src = "";
  currentResultDataUrl = null;
}

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = type === "ok" ? "#1a7a3a" : "#c0392b";
  t.classList.add("on");
  setTimeout(() => t.classList.remove("on"), 3500);
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  buildStyleGrid(false);
  const online = await checkAI();
  buildStyleGrid(online);
  setInterval(checkAI, 8000);
}
init();
</script>
</body>
</html>
