<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMD ADAPT KIOSK</title>
<style>
  :root {
    --red:  #ED1C24;
    --dark: #0a0a0a;
    --gray: #1a1a1a;
    --mid:  #2a2a2a;
    --text: #f0f0f0;
    --cyan: #00d4ff;
    --gold: #ffcc00;
    --dim:  #555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
  }

  /* ── Ticker ── */
  #ticker-wrap {
    height: 28px;
    min-height: 28px;
    background: #000;
    border-bottom: 1px solid #222;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  #ticker-wrap::before, #ticker-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 50px;
    z-index: 2;
    pointer-events: none;
  }
  #ticker-wrap::before { left: 0;  background: linear-gradient(to right, #000, transparent); }
  #ticker-wrap::after  { right: 0; background: linear-gradient(to left,  #000, transparent); }
  .ticker-label {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 110px;
    display: flex;
    align-items: center;
    padding-left: 10px;
    background: var(--red);
    color: white;
    font-size: 0.6rem;
    font-weight: 800;
    letter-spacing: 2px;
    z-index: 3;
  }
  #ticker-track {
    display: flex;
    align-items: center;
    height: 100%;
    padding-left: 120px;
    white-space: nowrap;
    animation: scroll 70s linear infinite;
  }
  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .ti {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-right: 40px;
    font-size: 0.68rem;
  }
  .ti-cat  { color: var(--red); font-weight: 700; font-size: 0.58rem; letter-spacing: 1.5px; }
  .ti-sep  { color: #444; }
  .ti-name { color: #ccc; }
  .ti-dot  { color: #333; margin-right: 40px; font-size: 0.45rem; }

  /* ── Header ── */
  header {
    height: 46px;
    min-height: 46px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: #111;
    border-bottom: 2px solid var(--red);
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-amd  { background: var(--red); color: #fff; font-weight: 900; font-size: 1.1rem; padding: 2px 8px; letter-spacing: 2px; }
  .logo-text { font-size: 0.95rem; font-weight: 300; letter-spacing: 4px; color: #bbb; }
  #ai-badge  { font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; background: #1a1a1a; border: 1px solid #444; color: #555; transition: all 0.3s; }
  #ai-badge.online { border-color: #22dd44; color: #22dd44; }

  /* ── Body ── */
  #body {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── Camera panel ── */
  #cam-panel {
    flex: 1;
    position: relative;
    background: #000;
    overflow: hidden;
    cursor: crosshair;
    min-width: 0;
  }
  #feed {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* overlays */
  .abs-overlay {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
  }
  .abs-overlay.on { display: flex; }
  #gen-overlay  { background: rgba(0,0,0,0.78); }
  #result-overlay { background: rgba(0,0,0,0.92); }

  .spinner {
    width: 50px; height: 50px;
    border: 4px solid #333;
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #gen-msg { color: var(--cyan); font-size: 0.95rem; letter-spacing: 1px; }
  #result-img { max-height: 80vh; max-width: 92%; border-radius: 8px; }
  #result-close {
    background: var(--red); color: #fff; border: none;
    padding: 11px 32px; border-radius: 6px; font-size: 0.95rem;
    cursor: pointer; font-weight: 700; letter-spacing: 1px;
  }

  /* selection badges */
  #sel-badge {
    position: absolute; top: 12px; left: 12px;
    background: var(--cyan); color: #000;
    font-weight: 700; font-size: 0.8rem;
    padding: 5px 12px; border-radius: 20px;
    display: none; z-index: 5;
  }
  #sel-badge.on { display: block; }
  #clear-btn {
    position: absolute; top: 12px; left: 12px;
    background: transparent; color: var(--cyan);
    border: 1px solid var(--cyan); font-size: 0.75rem;
    padding: 5px 12px; border-radius: 20px;
    cursor: pointer; display: none; z-index: 5;
  }
  #clear-btn.on { display: block; }
  #known-panel {
    position: absolute; bottom: 12px; left: 12px;
    display: flex; flex-wrap: wrap; gap: 5px;
    max-width: 55%; z-index: 5;
  }
  .known-tag {
    background: rgba(0,0,0,0.75);
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 20px; font-size: 0.68rem;
    padding: 3px 9px; cursor: default;
    display: flex; align-items: center; gap: 4px;
  }
  .ktx { color: #886600; font-size: 0.6rem; cursor: pointer; margin-left: 2px; }
  .ktx:hover { color: var(--red); }

  /* name modal */
  #name-modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    display: none; align-items: center; justify-content: center;
    z-index: 50;
  }
  #name-modal-bg.on { display: flex; }
  #name-dialog {
    background: #141414;
    border: 1px solid var(--cyan);
    border-radius: 12px; padding: 22px 24px;
    width: 300px; display: flex; flex-direction: column; gap: 14px;
    box-shadow: 0 8px 40px rgba(0,212,255,0.25);
  }
  #name-dialog h4 { font-size: 0.82rem; color: var(--cyan); letter-spacing: 1px; }
  #name-input {
    background: #1a1a1a; border: 1px solid #444; border-radius: 6px;
    color: #fff; padding: 9px 12px; font-size: 0.95rem; outline: none; width: 100%;
  }
  #name-input:focus { border-color: var(--cyan); }
  .nd-btns { display: flex; gap: 8px; }
  .nd-btns button { flex: 1; padding: 9px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-weight: 700; }
  #nd-save   { background: var(--cyan); color: #000; }
  #nd-cancel { background: #2a2a2a; color: #ccc; }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--gray);
    border-left: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sec-title {
    font-size: 0.58rem; letter-spacing: 3px; color: var(--dim);
    text-transform: uppercase; padding: 12px 16px 8px;
    border-bottom: 1px solid #222; flex-shrink: 0;
  }
  #char-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
    padding: 10px;
    overflow-y: auto;
    flex: 1;
  }
  .cc {
    background: var(--mid); border: 2px solid #333; border-radius: 8px;
    padding: 10px 6px; text-align: center; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .cc:hover  { border-color: #555; background: #333; }
  .cc.active { border-color: var(--cyan); background: rgba(0,212,255,0.08); }
  .cc-emoji { font-size: 1.5rem; margin-bottom: 4px; }
  .cc-name  { font-size: 0.73rem; font-weight: 600; }
  .cc-sub   { font-size: 0.57rem; color: var(--dim); margin-top: 2px; }
  .cc.ready .cc-name::after { content: " ✦"; color: var(--cyan); font-size: 0.58rem; }

  #xform-section {
    padding: 12px; border-top: 1px solid #222; flex-shrink: 0;
  }
  #sel-status {
    font-size: 0.68rem; color: var(--dim);
    text-align: center; padding: 6px 0 4px; min-height: 20px;
  }
  #sel-status.has { color: var(--cyan); }
  #xform-btn {
    width: 100%; padding: 14px;
    background: var(--red); color: #fff; border: none;
    border-radius: 8px; font-size: 0.92rem; font-weight: 700;
    letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
    transition: opacity 0.15s;
  }
  #xform-btn:hover    { opacity: 0.88; }
  #xform-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* toast */
  #toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    color: #fff; padding: 9px 22px; border-radius: 8px;
    font-size: 0.82rem; display: none; z-index: 99; white-space: nowrap;
  }
  #toast.on { display: block; }
</style>
</head>
<body>

<!-- Ticker -->
<div id="ticker-wrap">
  <div class="ticker-label">AMD STACK</div>
  <div id="ticker-track"></div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <span class="logo-amd">AMD</span>
    <span class="logo-text">ADAPT KIOSK</span>
  </div>
  <div id="ai-badge">AI ENGINE ●</div>
</header>

<!-- Main body -->
<div id="body">

  <!-- Camera -->
  <div id="cam-panel">
    <img id="feed" src="/video_feed" alt="Live Feed">

    <div id="sel-badge"></div>
    <button id="clear-btn" onclick="clearSel()">✕ Clear</button>
    <div id="known-panel"></div>

    <!-- Generating -->
    <div id="gen-overlay" class="abs-overlay">
      <div class="spinner"></div>
      <div id="gen-msg">Transforming...</div>
    </div>

    <!-- Result -->
    <div id="result-overlay" class="abs-overlay">
      <img id="result-img" src="" alt="Result">
      <button id="result-close" onclick="closeResult()">← Back to Camera</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sec-title">Choose Character</div>
    <div id="char-grid">
      <!-- Hardcoded fallback cards — JS will enhance with ai-ready state -->
    </div>
    <div id="xform-section">
      <div id="sel-status">Select a person to transform</div>
      <button id="name-btn" onclick="nameSelected()" style="
        width:100%; padding:9px; margin-bottom:8px;
        background:transparent; color:var(--cyan);
        border:1px solid var(--cyan); border-radius:8px;
        font-size:0.8rem; font-weight:700; letter-spacing:1px;
        cursor:pointer; display:none; text-transform:uppercase;
      ">👤 NAME SELECTED PERSON</button>
      <button id="xform-btn" onclick="doTransform()">⚡ TRANSFORM ME</button>
    </div>
  </div>

</div>

<!-- Name modal -->
<div id="name-modal-bg">
  <div id="name-dialog">
    <h4>👤 NAME THIS PERSON</h4>
    <input id="name-input" type="text" placeholder="Enter their name..." maxlength="30"
           onkeydown="if(event.key==='Enter') saveName()">
    <div class="nd-btns">
      <button id="nd-save"   onclick="saveName()">✓ Save</button>
      <button id="nd-cancel" onclick="closeName()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Ticker ────────────────────────────────────────────────────────────────────
const STACK = [
  ["CPU",      "AMD Threadripper PRO 9995X  ·  96 Cores / 192 Threads  ·  5.1 GHz Boost"],
  ["GPU",      "AMD Radeon PRO W7900  ·  48 GB GDDR6  ·  RDNA3  ·  gfx1100"],
  ["PLATFORM", "ROCm 6.2  ·  HIP Runtime  ·  HSA  ·  DirectML"],
  ["AI MODEL", "SDXL-Turbo  ·  Stable Diffusion XL 1.0 FP16  ·  4-step inference"],
  ["AI MODEL", "ControlNet LoRA Canny Rank-128  ·  Pose-guided generation"],
  ["ENGINE",   "ComfyUI v0.3.10  ·  AMD-optimized pipeline  ·  REST API"],
  ["VISION",   "OpenCV  ·  Haar Cascade Face Detection  ·  LBPH Face Recognition"],
  ["VISION",   "rembg  ·  u2net-human-seg  ·  Real-time body segmentation"],
  ["VISION",   "MediaPipe  ·  33-point pose skeleton tracking"],
  ["BACKEND",  "FastAPI  ·  Uvicorn ASGI  ·  MJPEG stream  ·  60fps"],
  ["OS",       "Ubuntu 24.04 LTS  ·  ROCm 6.2 kernel driver  ·  HSA Runtime"],
  ["CAMERA",   "Logitech Brio 4K  ·  1080p @ 60fps  ·  USB 3.0"],
];
(function buildTicker() {
  const t = [...STACK, ...STACK].map(([cat, name]) =>
    `<span class="ti"><span class="ti-cat">${cat}</span><span class="ti-sep">▸</span><span class="ti-name">${name}</span></span><span class="ti-dot">◆</span>`
  ).join("");
  document.getElementById("ticker-track").innerHTML = t;
})();

// ── Characters (hardcoded so UI works even if API is slow) ────────────────────
const CHARS = [
  { key:"navi",     emoji:"🔵", name:"Na'vi",    sub:"Avatar · Pandora" },
  { key:"hulk",     emoji:"💚", name:"Hulk",      sub:"Gamma · Avengers" },
  { key:"thanos",   emoji:"💜", name:"Thanos",    sub:"Infinity · Titan" },
  { key:"predator", emoji:"👁️", name:"Predator",  sub:"Thermal · Cloaked" },
  { key:"ghost",    emoji:"👻", name:"Ghost",     sub:"Spectral · Ethereal" },
  { key:"groot",    emoji:"🌿", name:"Groot",     sub:"Guardians · Flora" },
];

let selectedChar  = "navi";
let selCount      = 0;
let faceCount     = 0;
let pendingNameIdx = null;
let pollTimer     = null;

function buildCharGrid(aiReady) {
  const grid = document.getElementById("char-grid");
  grid.innerHTML = CHARS.map(c => `
    <div class="cc${c.key === selectedChar ? " active" : ""}${aiReady ? " ready" : ""}"
         onclick="selectChar('${c.key}', this)" data-key="${c.key}">
      <div class="cc-emoji">${c.emoji}</div>
      <div class="cc-name">${c.name}</div>
      <div class="cc-sub">${c.sub}</div>
    </div>`).join("");
}

function selectChar(key, el) {
  selectedChar = key;
  document.querySelectorAll(".cc").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
}

async function checkComfy() {
  try {
    const r = await fetch("/comfy_status");
    const d = await r.json();
    const b = document.getElementById("ai-badge");
    b.textContent = d.available ? "AI ENGINE ●" : "AI ENGINE ○";
    b.classList.toggle("online", !!d.available);
    return d.available;
  } catch(e) { return false; }
}

// ── Click to select person ────────────────────────────────────────────────────
function getImageCoords(e) {
  const feed = document.getElementById("feed");
  const rect = feed.getBoundingClientRect();
  const natW = feed.naturalWidth  || 1280;
  const natH = feed.naturalHeight || 720;
  const renW = rect.width;
  const renH = rect.height;
  const imgAR = natW / natH;
  const boxAR = renW / renH;
  let imgW, imgH, offX, offY;
  if (imgAR > boxAR) {
    imgW = renW; imgH = renW / imgAR;
    offX = 0;    offY = (renH - imgH) / 2;
  } else {
    imgH = renH; imgW = renH * imgAR;
    offX = (renW - imgW) / 2; offY = 0;
  }
  const cx = e.clientX - rect.left - offX;
  const cy = e.clientY - rect.top  - offY;
  if (cx < 0 || cy < 0 || cx > imgW || cy > imgH) return null;
  return { clickX: cx, clickY: cy, frameW: imgW, frameH: imgH };
}

document.getElementById("cam-panel").addEventListener("click", async function(e) {
  if (e.target.closest("button") || e.target.id === "result-img") return;
  if (document.getElementById("result-overlay").classList.contains("on")) return;
  if (document.getElementById("gen-overlay").classList.contains("on")) return;
  if (document.getElementById("name-modal-bg").classList.contains("on")) { closeName(); return; }

  const coords = getImageCoords(e);
  if (!coords) return;

  const fd = new FormData();
  fd.append("click_x", coords.clickX);
  fd.append("click_y", coords.clickY);
  fd.append("frame_w", coords.frameW);
  fd.append("frame_h", coords.frameH);

  try {
    const r    = await fetch("/select_person", { method:"POST", body:fd });
    const data = await r.json();
    updateSelUI(data.faces);
    const newSel = data.faces.find(f => f.selected && !f.name);
    if (newSel) openNameDialog(newSel, e.clientX, e.clientY);
  } catch(err) {}
});

let lastFaces = [];

function updateSelUI(faces) {
  lastFaces = faces || [];
  faceCount = lastFaces.length;
  selCount  = lastFaces.filter(f => f.selected).length;
  const badge   = document.getElementById("sel-badge");
  const clrBtn  = document.getElementById("clear-btn");
  const status  = document.getElementById("sel-status");
  const nameBtn = document.getElementById("name-btn");
  if (selCount > 0) {
    badge.textContent = `${selCount} selected`;
    badge.classList.add("on");
    clrBtn.classList.add("on");
    status.textContent = `Transforming ${selCount} of ${faceCount} person${faceCount > 1 ? "s" : ""}`;
    status.className = "has";
    nameBtn.style.display = "block";
  } else {
    badge.classList.remove("on");
    clrBtn.classList.remove("on");
    status.textContent = faceCount > 0 ? "Tap a person to select" : "Select a person to transform";
    status.className = "";
    nameBtn.style.display = "none";
  }
}

function nameSelected() {
  // Find first selected face
  const face = lastFaces.find(f => f.selected);
  if (face) openNameDialog(face);
}

async function clearSel() {
  await fetch("/clear_selection", { method:"POST" });
  updateSelUI([]);
}

// ── Name dialog ───────────────────────────────────────────────────────────────
function openNameDialog(face) {
  pendingNameIdx = face.index;
  document.getElementById("name-input").value = face.name || "";
  document.getElementById("name-modal-bg").classList.add("on");
  setTimeout(() => document.getElementById("name-input").focus(), 80);
}

function closeName() {
  document.getElementById("name-modal-bg").classList.remove("on");
  pendingNameIdx = null;
}

async function saveName() {
  const name = document.getElementById("name-input").value.trim();
  if (!name || pendingNameIdx === null) { closeName(); return; }
  const fd = new FormData();
  fd.append("index", pendingNameIdx);
  fd.append("name",  name);
  try {
    await fetch("/name_face", { method:"POST", body:fd });
    toast(`✓ ${name} saved`, "ok");
    refreshKnownNames();
  } catch(e) { toast("Could not save name"); }
  closeName();
}

async function refreshKnownNames() {
  try {
    const r    = await fetch("/known_names");
    const data = await r.json();
    const panel = document.getElementById("known-panel");
    panel.innerHTML = Object.values(data.names).map(n =>
      `<div class="known-tag">👤 ${n}<span class="ktx" onclick="forgetFace('${n}',event)">✕</span></div>`
    ).join("");
  } catch(e) {}
}

async function forgetFace(name, e) {
  e.stopPropagation();
  const fd = new FormData();
  fd.append("name", name);
  await fetch("/forget_face", { method:"POST", body:fd });
  toast(`Removed ${name}`);
  refreshKnownNames();
}

document.getElementById("name-modal-bg").addEventListener("click", function(e) {
  if (e.target === this) closeName();
});

// ── Transform ─────────────────────────────────────────────────────────────────
async function doTransform() {
  const btn = document.getElementById("xform-btn");
  btn.disabled = true;

  const online = await checkComfy();
  if (!online) {
    toast("AI Engine offline — run ~/start_comfyui.sh");
    btn.disabled = false;
    return;
  }

  document.getElementById("gen-overlay").classList.add("on");
  document.getElementById("gen-msg").textContent = selCount > 0
    ? `Transforming ${selCount} person${selCount > 1 ? "s" : ""}...`
    : "Transforming...";

  const fd = new FormData();
  fd.append("character", selectedChar);
  try {
    const r = await fetch("/generate", { method:"POST", body:fd });
    if (r.status === 400) {
      const d = await r.json();
      hideSpinner();
      toast(d.detail || "Select at least one person first");
      btn.disabled = false;
      return;
    }
    const data = await r.json();
    if (data.status === "generating" || data.status === "busy") {
      pollTimer = setInterval(pollStatus, 1000);
    } else {
      hideSpinner(); toast(data.message || "Error starting"); btn.disabled = false;
    }
  } catch(e) { hideSpinner(); toast("Connection error"); btn.disabled = false; }
}

async function pollStatus() {
  try {
    const r    = await fetch("/generate_status");
    const data = await r.json();
    if (data.status === "done" && data.image) {
      clearInterval(pollTimer); hideSpinner(); showResult(data.image);
      document.getElementById("xform-btn").disabled = false;
    } else if (data.status === "error") {
      clearInterval(pollTimer); hideSpinner();
      toast("Error: " + (data.message || "unknown"));
      document.getElementById("xform-btn").disabled = false;
    } else if (data.message) {
      document.getElementById("gen-msg").textContent = data.message;
    }
  } catch(e) {}
}

function hideSpinner() { document.getElementById("gen-overlay").classList.remove("on"); }
function showResult(src) {
  document.getElementById("result-img").src = src;
  document.getElementById("result-overlay").classList.add("on");
}
function closeResult() {
  document.getElementById("result-overlay").classList.remove("on");
  document.getElementById("result-img").src = "";
}

function toast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = type === "ok" ? "#1a7a3a" : "#c0392b";
  t.classList.add("on");
  setTimeout(() => t.classList.remove("on"), 4000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  // Build character grid immediately from hardcoded data — no API dependency
  buildCharGrid(false);

  // Then check if ComfyUI is up and mark cards as AI-ready
  const online = await checkComfy();
  buildCharGrid(online);

  setInterval(checkComfy, 10000);
  refreshKnownNames();
}

init();
</script>
</body>
</html>
