<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMD ADAPT KIOSK</title>
<style>
  :root {
    --amd-red: #ED1C24;
    --amd-dark: #0a0a0a;
    --amd-gray: #1a1a1a;
    --amd-light: #2a2a2a;
    --text: #f0f0f0;
    --cyan: #00d4ff;
    --dim: #555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--amd-dark);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: #111;
    border-bottom: 2px solid var(--amd-red);
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-amd {
    background: var(--amd-red);
    color: white;
    font-weight: 900;
    font-size: 1.3rem;
    padding: 4px 10px;
    letter-spacing: 2px;
  }
  .logo-text { font-size: 1.1rem; font-weight: 300; letter-spacing: 4px; color: #ccc; }
  #comfy-badge {
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 20px;
    background: #222;
    border: 1px solid var(--dim);
    color: var(--dim);
  }
  #comfy-badge.online { border-color: #22dd44; color: #22dd44; }

  /* ── Main layout ── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── Camera panel ── */
  #cam-panel {
    flex: 1;
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: crosshair;
  }
  #feed {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Selection hint overlay */
  #select-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: var(--cyan);
    font-size: 0.85rem;
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid var(--cyan);
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #select-hint.hidden { opacity: 0; }

  /* Selected count badge */
  #selected-badge {
    position: absolute;
    top: 14px;
    left: 14px;
    background: var(--cyan);
    color: #000;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 6px 14px;
    border-radius: 20px;
    display: none;
  }
  #selected-badge.visible { display: block; }

  /* Clear selection btn */
  #clear-sel-btn {
    position: absolute;
    top: 14px;
    left: 14px;
    background: transparent;
    color: var(--cyan);
    border: 1px solid var(--cyan);
    font-size: 0.8rem;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    display: none;
  }
  #clear-sel-btn.visible { display: block; }

  /* AI Result overlay */
  #result-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    display: none;
  }
  #result-overlay.visible { display: flex; }
  #result-img { max-height: 75vh; max-width: 90%; border-radius: 8px; }
  #result-close {
    background: var(--amd-red);
    color: white;
    border: none;
    padding: 12px 36px;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 1px;
  }

  /* Generating spinner */
  #gen-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #gen-overlay.visible { display: flex; }
  .spinner {
    width: 52px; height: 52px;
    border: 4px solid #333;
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #gen-msg { color: var(--cyan); font-size: 1rem; letter-spacing: 1px; }

  /* ── Right sidebar ── */
  aside {
    width: 280px;
    flex-shrink: 0;
    background: var(--amd-gray);
    border-left: 1px solid #333;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .section-title {
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    padding: 14px 18px 8px;
    border-bottom: 1px solid #2a2a2a;
  }

  /* Character grid */
  #char-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 12px;
    overflow-y: auto;
  }
  .char-card {
    background: var(--amd-light);
    border: 2px solid #333;
    border-radius: 8px;
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .char-card:hover { border-color: #555; background: #333; }
  .char-card.active { border-color: var(--cyan); background: rgba(0,212,255,0.08); }
  .char-emoji { font-size: 1.6rem; margin-bottom: 4px; }
  .char-name { font-size: 0.78rem; font-weight: 600; }
  .char-sub  { font-size: 0.6rem; color: var(--dim); margin-top: 2px; }
  .char-card.ai-ready .char-name::after {
    content: " ✦";
    color: var(--cyan);
    font-size: 0.65rem;
  }

  /* Transform button */
  #transform-section {
    padding: 14px;
    border-top: 1px solid #2a2a2a;
    margin-top: auto;
  }
  #transform-btn {
    width: 100%;
    padding: 16px;
    background: var(--amd-red);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    text-transform: uppercase;
  }
  #transform-btn:hover { opacity: 0.88; transform: scale(1.01); }
  #transform-btn:active { transform: scale(0.98); }
  #transform-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  #selection-status {
    font-size: 0.72rem;
    color: var(--cyan);
    text-align: center;
    padding: 8px 0 4px;
    min-height: 22px;
  }
  #selection-status.all { color: var(--dim); }

  /* Error toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #c0392b;
    color: white;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 0.85rem;
    display: none;
    z-index: 999;
  }
  #toast.visible { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-amd">AMD</span>
    <span class="logo-text">ADAPT KIOSK</span>
  </div>
  <div id="comfy-badge">AI ENGINE ●</div>
</header>

<main>
  <!-- Camera feed -->
  <div id="cam-panel">
    <img id="feed" src="/video_feed" alt="Camera Feed">

    <div id="selected-badge"></div>
    <button id="clear-sel-btn" onclick="clearSelection()">✕ Clear Selection</button>

    <div id="select-hint">Tap a person to select them for transformation</div>

    <!-- Generating spinner -->
    <div id="gen-overlay">
      <div class="spinner"></div>
      <div id="gen-msg">Transforming...</div>
    </div>

    <!-- AI result -->
    <div id="result-overlay">
      <img id="result-img" src="" alt="AI Result">
      <button id="result-close" onclick="closeResult()">← Back to Camera</button>
    </div>
  </div>

  <!-- Sidebar -->
  <aside>
    <div class="section-title">Choose Character</div>
    <div id="char-grid"><!-- populated by JS --></div>

    <div id="transform-section">
      <div id="selection-status" class="all">All people will be transformed</div>
      <button id="transform-btn" onclick="doTransform()">⚡ TRANSFORM ME</button>
    </div>
  </aside>
</main>

<div id="toast"></div>

<script>
let selectedChar  = "navi";
let pollTimer     = null;
let faceCount     = 0;
let selCount      = 0;

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadCharacters();
  checkComfy();
  setInterval(checkComfy, 8000);
}

async function loadCharacters() {
  try {
    const r    = await fetch("/characters");
    const data = await r.json();
    const grid = document.getElementById("char-grid");
    grid.innerHTML = "";
    data.characters.forEach(c => {
      const card = document.createElement("div");
      card.className = `char-card${c.ai_ready ? " ai-ready" : ""}${c.key === selectedChar ? " active" : ""}`;
      card.dataset.key = c.key;
      card.innerHTML = `
        <div class="char-emoji">${c.emoji}</div>
        <div class="char-name">${c.label}</div>
        <div class="char-sub">${c.subtitle}</div>`;
      card.onclick = () => selectChar(c.key, card);
      grid.appendChild(card);
    });
  } catch(e) { showToast("Couldn't load characters"); }
}

function selectChar(key, card) {
  selectedChar = key;
  document.querySelectorAll(".char-card").forEach(c => c.classList.remove("active"));
  card.classList.add("active");
}

async function checkComfy() {
  try {
    const r    = await fetch("/comfy_status");
    const data = await r.json();
    const badge = document.getElementById("comfy-badge");
    badge.textContent = data.available ? "AI ENGINE ●" : "AI ENGINE ○";
    badge.classList.toggle("online", data.available);
  } catch(e) {}
}

// ── Camera click → person selection ──────────────────────────────────────────
document.getElementById("cam-panel").addEventListener("click", async function(e) {
  // Ignore clicks on buttons/overlays
  if (e.target.tagName === "BUTTON" || e.target.tagName === "IMG" && e.target.id === "result-img") return;
  if (document.getElementById("result-overlay").classList.contains("visible")) return;
  if (document.getElementById("gen-overlay").classList.contains("visible")) return;

  const feed = document.getElementById("feed");
  const rect = feed.getBoundingClientRect();

  // Click position relative to feed image
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;
  const frameW = rect.width;
  const frameH = rect.height;

  const fd = new FormData();
  fd.append("click_x", clickX);
  fd.append("click_y", clickY);
  fd.append("frame_w", frameW);
  fd.append("frame_h", frameH);

  try {
    const r    = await fetch("/select_person", {method:"POST", body:fd});
    const data = await r.json();
    updateSelectionUI(data.faces);
  } catch(e) {}
});

function updateSelectionUI(faces) {
  faceCount = faces.length;
  selCount  = faces.filter(f => f.selected).length;

  const badge    = document.getElementById("selected-badge");
  const clearBtn = document.getElementById("clear-sel-btn");
  const status   = document.getElementById("selection-status");
  const hint     = document.getElementById("select-hint");

  if (selCount > 0) {
    badge.textContent = `${selCount} selected`;
    badge.classList.add("visible");
    clearBtn.classList.add("visible");
    status.textContent = `Transforming ${selCount} of ${faceCount} people`;
    status.className = "";
    hint.classList.add("hidden");
  } else {
    badge.classList.remove("visible");
    clearBtn.classList.remove("visible");
    status.textContent = faceCount > 0 ? "Tap someone to select · or transform all" : "All people will be transformed";
    status.className = "all";
    hint.classList.toggle("hidden", faceCount === 0);
  }
}

async function clearSelection() {
  await fetch("/clear_selection", {method:"POST"});
  updateSelectionUI([]);
}

// ── Transform ─────────────────────────────────────────────────────────────────
async function doTransform() {
  const btn = document.getElementById("transform-btn");
  btn.disabled = true;

  // Check ComfyUI
  try {
    const r = await fetch("/comfy_status");
    const d = await r.json();
    if (!d.available) {
      showToast("AI Engine offline — run ~/start_comfyui.sh in a terminal");
      btn.disabled = false;
      return;
    }
  } catch(e) { btn.disabled = false; return; }

  // Show spinner
  document.getElementById("gen-overlay").classList.add("visible");
  document.getElementById("gen-msg").textContent = selCount > 0
    ? `Transforming ${selCount} selected person${selCount>1?"s":""}...`
    : "Transforming...";

  // Start generation
  const fd = new FormData();
  fd.append("character", selectedChar);
  try {
    const r    = await fetch("/generate", {method:"POST", body:fd});
    const data = await r.json();
    if (data.status === "generating" || data.status === "busy") {
      pollTimer = setInterval(pollStatus, 1000);
    } else {
      hideSpinner();
      showToast(data.message || "Error starting generation");
      btn.disabled = false;
    }
  } catch(e) {
    hideSpinner();
    showToast("Connection error");
    btn.disabled = false;
  }
}

async function pollStatus() {
  try {
    const r    = await fetch("/generate_status");
    const data = await r.json();
    if (data.status === "done" && data.image) {
      clearInterval(pollTimer);
      hideSpinner();
      showResult(data.image);
      document.getElementById("transform-btn").disabled = false;
    } else if (data.status === "error") {
      clearInterval(pollTimer);
      hideSpinner();
      showToast("Generation failed: " + (data.message || "unknown error"));
      document.getElementById("transform-btn").disabled = false;
    } else if (data.message) {
      document.getElementById("gen-msg").textContent = data.message;
    }
  } catch(e) {}
}

function hideSpinner() {
  document.getElementById("gen-overlay").classList.remove("visible");
}

function showResult(src) {
  document.getElementById("result-img").src = src;
  document.getElementById("result-overlay").classList.add("visible");
}

function closeResult() {
  document.getElementById("result-overlay").classList.remove("visible");
  document.getElementById("result-img").src = "";
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("visible");
  setTimeout(() => t.classList.remove("visible"), 4000);
}

init();
</script>
</body>
</html>
