<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMD Adapt - ROCm AI Photo Booth</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');

  :root {
    --bg:      #050508;
    --card:    #0d0d12;
    --card-hi: #14141c;
    --border:  #1a1a25;
    --text:    #eaeaef;
    --dim:     #555568;
    --accent:  #00d4ff;
    --red:     #ED1C24;
    --green:   #22dd44;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    overflow: hidden; user-select: none;
  }
  body { display: flex; flex-direction: column; }

  /* ── Header ── */
  header {
    height: 56px; min-height: 56px; display: flex;
    align-items: center; justify-content: space-between;
    padding: 0 28px;
    background: linear-gradient(180deg, #0f0f14 0%, #0a0a0f 100%);
    border-bottom: 1px solid #1a1a25;
    flex-shrink: 0; position: relative; z-index: 5;
  }
  header::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--red) 0%, var(--red) 30%, transparent 100%);
  }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-badge {
    background: var(--red); color: #fff; font-weight: 900;
    font-size: 0.95rem; padding: 4px 12px; letter-spacing: 2px;
    clip-path: polygon(0 0, 100% 0, 95% 100%, 0 100%);
  }
  .logo-text {
    font-size: 0.85rem; font-weight: 300;
    letter-spacing: 6px; color: #888; text-transform: uppercase;
  }
  .logo-sep {
    width: 1px; height: 20px; background: #333; margin: 0 4px;
  }
  .logo-tagline {
    font-size: 0.62rem; font-weight: 300;
    letter-spacing: 1.5px; color: #555;
  }
  #ai-badge {
    font-size: 0.65rem; padding: 5px 14px; border-radius: 20px;
    background: rgba(255,255,255,0.03); border: 1px solid #333;
    color: #444; letter-spacing: 1.5px; font-weight: 600;
    transition: all 0.5s ease;
  }
  #ai-badge.online {
    border-color: var(--green); color: var(--green);
    box-shadow: 0 0 12px rgba(34,221,68,0.15);
  }

  /* ── Layout ── */
  #main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

  /* ── Camera panel ── */
  #cam-panel {
    flex: 1; position: relative; background: #000;
    overflow: hidden; min-width: 0;
  }
  #cam-panel::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    pointer-events: none;
    border: 1px solid rgba(255,255,255,0.03);
  }
  #feed {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; display: block;
  }

  /* ── Overlays ── */
  .overlay {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center;
    justify-content: center; gap: 18px; z-index: 10;
  }
  .overlay.on { display: flex; }
  #gen-overlay {
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.92) 100%);
    backdrop-filter: blur(8px);
  }
  #result-overlay {
    background: rgba(5,5,8,0.96);
    backdrop-filter: blur(4px);
  }

  .spinner {
    width: 52px; height: 52px;
    border: 3px solid rgba(255,255,255,0.06);
    border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #gen-msg {
    color: var(--accent); font-size: 1rem;
    letter-spacing: 1.5px; font-weight: 600;
  }
  .progress-wrap {
    width: 320px; max-width: 80%; background: rgba(255,255,255,0.05);
    border-radius: 10px; height: 5px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), #0088ff);
    border-radius: 10px; transition: width 0.5s ease;
  }
  #progress-label {
    font-size: 0.65rem; color: var(--dim);
    letter-spacing: 1.5px; font-weight: 400;
  }
  #elapsed { font-size: 0.6rem; color: #333; font-weight: 300; }

  /* ── Result ── */
  #result-img {
    max-height: 74vh; max-width: 90%;
    border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .result-btns { display: flex; gap: 12px; margin-top: 4px; }
  .result-btns button {
    padding: 14px 32px; border: none; border-radius: 8px;
    font-size: 0.85rem; font-weight: 700; letter-spacing: 1px;
    cursor: pointer; transition: all 0.15s; text-transform: uppercase;
  }
  #save-btn {
    background: var(--green); color: #000;
    box-shadow: 0 4px 20px rgba(34,221,68,0.25);
  }
  #save-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(34,221,68,0.35); }
  #close-btn { background: rgba(255,255,255,0.08); color: #aaa; }
  #close-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

  /* ── Sidebar ── */
  #sidebar {
    width: 300px; min-width: 300px;
    background: linear-gradient(180deg, var(--card) 0%, #080810 100%);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── Sidebar header ── */
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-header h2 {
    font-size: 0.65rem; letter-spacing: 4px; color: var(--dim);
    text-transform: uppercase; font-weight: 600; margin-bottom: 4px;
  }
  .sidebar-header p {
    font-size: 0.7rem; color: #444; font-weight: 300;
  }

  /* ── Style grid ── */
  #style-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; padding: 12px 12px; flex: 1; min-height: 0;
    overflow-y: auto; align-content: start;
  }
  .style-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 10px 6px 8px; text-align: center; cursor: pointer;
    transition: all 0.2s ease; position: relative; overflow: hidden;
  }
  .style-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at top, rgba(255,255,255,0.03) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.2s;
  }
  .style-card:hover {
    border-color: rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    transform: translateY(-1px);
  }
  .style-card:hover::before { opacity: 1; }
  .style-card.active {
    border-color: var(--accent);
    background: rgba(0,212,255,0.05);
    box-shadow: 0 0 20px rgba(0,212,255,0.08), inset 0 1px 0 rgba(0,212,255,0.1);
  }
  .style-card.active::before { opacity: 1; }
  .style-card.active .style-name { color: var(--accent); }

  .style-emoji { font-size: 1.3rem; margin-bottom: 4px; position: relative; z-index: 1; }
  .style-name {
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.5px; position: relative; z-index: 1;
    transition: color 0.2s;
  }
  .style-sub {
    font-size: 0.48rem; color: var(--dim);
    margin-top: 2px; position: relative; z-index: 1;
    letter-spacing: 0.5px;
  }
  .style-card.ready .style-name::after {
    content: ""; display: inline-block;
    width: 5px; height: 5px; background: var(--accent);
    border-radius: 50%; margin-left: 6px; vertical-align: middle;
    box-shadow: 0 0 6px var(--accent);
  }

  /* ── Action section ── */
  #action-section {
    padding: 16px 16px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0; margin-top: auto;
    background: rgba(0,0,0,0.2);
  }

  #transform-btn {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, var(--red) 0%, #b8101a 50%, var(--red) 100%);
    background-size: 200% 100%;
    color: #fff; border: none; border-radius: 12px;
    font-size: 0.95rem; font-weight: 800; letter-spacing: 3px;
    cursor: pointer; text-transform: uppercase;
    transition: all 0.3s ease;
    box-shadow: 0 4px 24px rgba(237,28,36,0.2);
    position: relative; overflow: hidden;
  }
  #transform-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
    background-size: 200% 100%;
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 200% 0; }
    50% { background-position: -200% 0; }
  }
  #transform-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 32px rgba(237,28,36,0.35);
  }
  #transform-btn:active { transform: translateY(0); }
  #transform-btn:disabled {
    opacity: 0.25; cursor: not-allowed;
    transform: none; box-shadow: none;
  }
  #transform-btn:disabled::before { animation: none; }

  #mode-label {
    font-size: 0.55rem; color: #333; text-align: center;
    padding: 10px 0 0; letter-spacing: 1.5px; font-weight: 300;
  }
  #mode-label span { color: var(--accent); font-weight: 600; }

  /* ── Countdown overlay ── */
  #countdown-overlay {
    position: absolute; inset: 0; z-index: 8;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  #countdown-overlay.on { display: flex; }
  #countdown-number {
    font-size: 12rem; font-weight: 900; color: #fff;
    text-shadow: 0 0 60px rgba(0,212,255,0.5), 0 0 120px rgba(0,212,255,0.2);
    animation: countPulse 1s ease-in-out infinite;
    line-height: 1;
  }
  @keyframes countPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.85; }
  }
  #countdown-label {
    font-size: 0.85rem; color: var(--accent); letter-spacing: 4px;
    font-weight: 600; text-transform: uppercase; margin-top: 8px;
  }
  /* Stability indicator bar */
  #stability-bar-wrap {
    position: absolute; bottom: 16px; left: 50%;
    transform: translateX(-50%); z-index: 7;
    width: 200px; height: 4px; border-radius: 4px;
    background: rgba(255,255,255,0.08);
    overflow: hidden; display: none;
  }
  #stability-bar-wrap.on { display: block; }
  #stability-bar {
    height: 100%; width: 0%; border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), #0088ff);
    transition: width 0.3s ease;
  }
  #stability-hint {
    position: absolute; bottom: 26px; left: 50%;
    transform: translateX(-50%); z-index: 7;
    font-size: 0.55rem; color: var(--dim); letter-spacing: 1.5px;
    white-space: nowrap; display: none;
  }
  #stability-hint.on { display: block; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: #fff; padding: 12px 28px; border-radius: 10px;
    font-size: 0.8rem; display: none; z-index: 99;
    white-space: nowrap; pointer-events: none;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    font-weight: 500; letter-spacing: 0.5px;
  }
  #toast.on { display: block; animation: slideUp 0.3s ease; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <span class="logo-badge">AMD</span>
    <span class="logo-text">Adapt</span>
    <span class="logo-sep"></span>
    <span class="logo-tagline">ROCm-Accelerated AI Photo Booth</span>
  </div>
  <div id="ai-badge">AI ENGINE</div>
</header>

<!-- Main -->
<div id="main">

  <!-- Camera -->
  <div id="cam-panel">
    <img id="feed" src="/video_feed" alt="Live Feed">

    <!-- Countdown overlay -->
    <div id="countdown-overlay">
      <div id="countdown-number"></div>
      <div id="countdown-label">Hold still!</div>
    </div>
    <div id="stability-hint">Hold your pose to auto-capture</div>
    <div id="stability-bar-wrap"><div id="stability-bar"></div></div>

    <!-- Generating overlay -->
    <div id="gen-overlay" class="overlay">
      <div class="spinner"></div>
      <div id="gen-msg">Transforming scene...</div>
      <div class="progress-wrap"><div id="progress-bar"></div></div>
      <div id="progress-label">Starting AI engine...</div>
      <div id="elapsed">0s</div>
    </div>

    <!-- Result overlay -->
    <div id="result-overlay" class="overlay">
      <img id="result-img" src="" alt="Result">
      <div class="result-btns">
        <button id="save-btn" onclick="savePhoto()">Save Photo</button>
        <button id="close-btn" onclick="closeResult()">Try Another</button>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <h2>Choose Your Style</h2>
      <p>Select a style, then hit transform</p>
    </div>
    <div id="style-grid"></div>
    <div id="action-section">
      <button id="transform-btn" onclick="doTransform()">Transform Scene</button>
      <div id="mode-label"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const STYLES = [
  { key: "avatar",      emoji: "\uD83D\uDD35", name: "Avatar",      sub: "Na'vi \u00B7 Pandora" },
  { key: "anime",       emoji: "\u2728",       name: "Anime",       sub: "Cel Shaded \u00B7 Manga" },
  { key: "cyberpunk",   emoji: "\uD83E\uDD16", name: "Cyberpunk",   sub: "Neon Noir \u00B7 Chrome" },
  { key: "claymation",  emoji: "\uD83C\uDFA8", name: "Claymation",  sub: "Clay \u00B7 Stop Motion" },
  { key: "oilpainting", emoji: "\uD83D\uDDBC\uFE0F", name: "Oil Painting", sub: "Renaissance \u00B7 Canvas" },
  { key: "comicbook",   emoji: "\uD83D\uDCA5", name: "Comic Book",  sub: "Ink \u00B7 Halftone" },
  { key: "pixelart",    emoji: "\uD83D\uDC7E", name: "Pixel Art",   sub: "Retro \u00B7 16-Bit" },
  { key: "steampunk",   emoji: "\u2699\uFE0F", name: "Steampunk",   sub: "Brass \u00B7 Victorian" },
  { key: "watercolor",  emoji: "\uD83C\uDF3A", name: "Watercolor",  sub: "Soft \u00B7 Delicate" },
  { key: "zombie",      emoji: "\uD83E\uDDDF", name: "Zombie",      sub: "Horror \u00B7 Undead" },
  { key: "fantasy",     emoji: "\uD83E\uDDD9", name: "Fantasy Elf", sub: "Magic \u00B7 Enchanted" },
  { key: "popart",      emoji: "\uD83C\uDFA8", name: "Pop Art",     sub: "Bold \u00B7 Graphic" },
  { key: "ice",         emoji: "\u2744\uFE0F", name: "Ice & Frost", sub: "Frozen \u00B7 Crystal" },
  { key: "neon",        emoji: "\uD83D\uDD2E", name: "Neon Glow",   sub: "Electric \u00B7 UV" },
];

let selectedStyle = "avatar";
let pollTimer = null;
let currentResultDataUrl = null;

function buildStyleGrid(aiReady) {
  const grid = document.getElementById("style-grid");
  grid.innerHTML = STYLES.map(s => `
    <div class="style-card${s.key === selectedStyle ? " active" : ""}${aiReady ? " ready" : ""}"
         onclick="selectStyle('${s.key}', this)" data-key="${s.key}">
      <div class="style-emoji">${s.emoji}</div>
      <div class="style-name">${s.name}</div>
      <div class="style-sub">${s.sub}</div>
    </div>`).join("");
}

function selectStyle(key, el) {
  selectedStyle = key;
  document.querySelectorAll(".style-card").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
}

async function checkAI() {
  try {
    const r = await fetch("/comfy_status");
    const d = await r.json();
    const b = document.getElementById("ai-badge");
    b.textContent = d.available ? "AI READY" : "AI LOADING\u2026";
    b.classList.toggle("online", !!d.available);
    const ml = document.getElementById("mode-label");
    if (d.mode) ml.innerHTML = "Pipeline: <span>" + d.mode + "</span>";
    return d.available;
  } catch { return false; }
}

function savePhoto() {
  if (!currentResultDataUrl) return;
  const ts = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
  const name = "scene_" + selectedStyle + "_" + ts + ".jpg";
  const a = document.createElement("a");
  a.href = currentResultDataUrl;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast("Photo saved!", "ok");
}

let genStart = 0, progressTmr = null, elapsedTmr = null, stageIdx = 0;

const STAGES = [
  { pct: 5,  label: "Capturing scene\u2026" },
  { pct: 12, label: "Analyzing depth\u2026" },
  { pct: 25, label: "Transforming scene\u2026" },
  { pct: 45, label: "Applying style\u2026" },
  { pct: 60, label: "Rendering details\u2026" },
  { pct: 75, label: "Refining composition\u2026" },
  { pct: 88, label: "Almost there\u2026" },
  { pct: 95, label: "Final touches\u2026" },
];
const STAGE_TIMES = [1500, 2500, 4000, 4000, 4000, 4000, 3000, 3000];

function setProgress(pct, label) {
  document.getElementById("progress-bar").style.width = pct + "%";
  if (label) document.getElementById("progress-label").textContent = label;
}

function startProgress() {
  stageIdx = 0; genStart = Date.now();
  setProgress(0, "Starting AI engine\u2026");
  function advance() {
    if (stageIdx >= STAGES.length) return;
    setProgress(STAGES[stageIdx].pct, STAGES[stageIdx].label);
    stageIdx++;
    if (stageIdx < STAGES.length)
      progressTmr = setTimeout(advance, STAGE_TIMES[stageIdx - 1] || 3000);
  }
  advance();
  elapsedTmr = setInterval(() => {
    document.getElementById("elapsed").textContent =
      Math.floor((Date.now() - genStart) / 1000) + "s";
  }, 1000);
}

function stopProgress() {
  if (progressTmr) { clearTimeout(progressTmr); progressTmr = null; }
  if (elapsedTmr) { clearInterval(elapsedTmr); elapsedTmr = null; }
}

async function doTransform() {
  cancelCountdown();
  fetch("/motion_reset", { method: "POST" }).catch(() => {});
  const btn = document.getElementById("transform-btn");
  btn.disabled = true;
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  const online = await checkAI();
  if (!online) { toast("AI Engine still loading"); btn.disabled = false; return; }

  document.getElementById("gen-overlay").classList.add("on");
  document.getElementById("gen-msg").textContent =
    "Transforming into " + STYLES.find(s => s.key === selectedStyle).name + "\u2026";
  startProgress();

  const fd = new FormData();
  fd.append("character", selectedStyle);
  try {
    const r = await fetch("/generate", { method: "POST", body: fd });
    if (r.status >= 400) {
      const d = await r.json();
      stopProgress();
      document.getElementById("gen-overlay").classList.remove("on");
      toast(d.detail || "Error"); btn.disabled = false; return;
    }
    const data = await r.json();
    if (data.status === "generating" || data.status === "busy") {
      pollTimer = setInterval(pollStatus, 1200);
    } else {
      stopProgress();
      document.getElementById("gen-overlay").classList.remove("on");
      toast(data.message || "Error"); btn.disabled = false;
    }
  } catch {
    stopProgress();
    document.getElementById("gen-overlay").classList.remove("on");
    toast("Connection error"); btn.disabled = false;
  }
}

async function pollStatus() {
  try {
    const r = await fetch("/generate_status");
    const data = await r.json();
    if (data.status === "done" && data.image) {
      clearInterval(pollTimer); pollTimer = null;
      stopProgress(); setProgress(100, "Done!");
      setTimeout(() => {
        document.getElementById("gen-overlay").classList.remove("on");
        currentResultDataUrl = data.image;
        document.getElementById("result-img").src = data.image;
        document.getElementById("result-overlay").classList.add("on");
        document.getElementById("transform-btn").disabled = false;
      }, 300);
    } else if (data.status === "error") {
      clearInterval(pollTimer); pollTimer = null; stopProgress();
      document.getElementById("gen-overlay").classList.remove("on");
      toast("Error: " + (data.message || "unknown"));
      document.getElementById("transform-btn").disabled = false;
    } else if (data.status === "idle") {
      clearInterval(pollTimer); pollTimer = null;
      stopProgress();
      document.getElementById("gen-overlay").classList.remove("on");
      document.getElementById("transform-btn").disabled = false;
    }
  } catch {}
}

function closeResult() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  document.getElementById("result-overlay").classList.remove("on");
  document.getElementById("result-img").src = "";
  currentResultDataUrl = null;
}

function toast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = type === "ok"
    ? "rgba(26,122,58,0.9)" : "rgba(192,57,43,0.9)";
  t.classList.add("on");
  setTimeout(() => t.classList.remove("on"), 3500);
}

// ── Auto-capture: hold pose 3s → 5s countdown → transform ──
let countdownActive = false;
let countdownTimer = null;
let countdownValue = 0;
let motionPollTimer = null;
let wasStable = false;
const STABLE_TRIGGER = 3.0;   // seconds of stillness before countdown
const COUNTDOWN_FROM = 5;

function startMotionPolling() {
  if (motionPollTimer) return;
  motionPollTimer = setInterval(pollMotion, 400);
}

function stopMotionPolling() {
  if (motionPollTimer) { clearInterval(motionPollTimer); motionPollTimer = null; }
}

async function pollMotion() {
  // Don't trigger if generating or showing result
  if (document.getElementById("gen-overlay").classList.contains("on")) return;
  if (document.getElementById("result-overlay").classList.contains("on")) return;
  if (!countdownActive && document.getElementById("transform-btn").disabled) return;

  try {
    const r = await fetch("/motion_status");
    const d = await r.json();
    const stableS = d.stable_seconds || 0;

    const barWrap = document.getElementById("stability-bar-wrap");
    const bar = document.getElementById("stability-bar");
    const hint = document.getElementById("stability-hint");

    if (stableS > 0.5 && stableS < STABLE_TRIGGER) {
      // Show progress toward trigger
      if (countdownActive) cancelCountdown();
      barWrap.classList.add("on");
      hint.classList.add("on");
      bar.style.width = Math.min(100, (stableS / STABLE_TRIGGER) * 100) + "%";
    } else if (stableS >= STABLE_TRIGGER && !countdownActive) {
      barWrap.classList.remove("on");
      hint.classList.remove("on");
      bar.style.width = "0%";
      beginCountdown();
    } else if (stableS < 0.5) {
      if (countdownActive) cancelCountdown();
      barWrap.classList.remove("on");
      hint.classList.remove("on");
      bar.style.width = "0%";
    }
  } catch {}
}

function beginCountdown() {
  if (countdownActive) return;
  countdownActive = true;
  countdownValue = COUNTDOWN_FROM;

  const overlay = document.getElementById("countdown-overlay");
  const numEl = document.getElementById("countdown-number");

  overlay.classList.add("on");
  numEl.textContent = countdownValue;

  countdownTimer = setInterval(() => {
    countdownValue--;
    if (countdownValue > 0) {
      numEl.textContent = countdownValue;
    } else {
      // Fire!
      clearInterval(countdownTimer);
      countdownTimer = null;
      overlay.classList.remove("on");
      countdownActive = false;
      doTransform();
    }
  }, 1000);
}

function cancelCountdown() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  countdownActive = false;
  document.getElementById("countdown-overlay").classList.remove("on");
}

async function init() {
  buildStyleGrid(false);
  const online = await checkAI();
  buildStyleGrid(online);
  setInterval(checkAI, 8000);
  startMotionPolling();
}
init();
</script>
